  ctx += "Food Cost gesamt: " + fmt(kAll.f) + " (" + fmtP(kAll.fp) + " vom Umsatz, Ziel 22%)\n";
  ctx += "Ø Bon-Wert: " + fmtD(kAll.at) + " (Ziel €22)\n";

  // Nach Standort
  var md = alle.filter(function(r){return r.st==="Mehringdamm";});
  var rs = alle.filter(function(r){return r.st==="Rosenthaler Straße";});
  var kMD = kpi(md), kRS = kpi(rs);
  ctx += "=== NACH STANDORT ===\n";
  ctx += "Mehringdamm: " + fmt(kMD.u) + " Umsatz | FC: " + fmtP(kMD.fp) + " | Ø Bon: " + fmtD(kMD.at) + "\n";
  ctx += "Rosenthaler Straße: " + fmt(kRS.u) + " Umsatz | FC: " + fmtP(kRS.fp) + " | Ø Bon: " + fmtD(kRS.at) + "\n\n";

  // Personal (Ordio)
  if(ordio.length > 0) {
    var totalKosten = ordio.reduce(function(s,r){return s+r.kosten;},0);
    var totalStunden = ordio.reduce(function(s,r){return s+r.stunden;},0);
    var paQuote = kAll.u > 0 ? totalKosten/kAll.u : 0;
    ctx += "=== PERSONAL (Ordio) ===\n";
    ctx += "Personalkosten gesamt: " + fmt(totalKosten) + " (" + fmtP(paQuote) + " vom Umsatz, Ziel 22%)\n";
    ctx += "Gesamtstunden: " + Math.round(totalStunden) + "h\n";
    ctx += "Ø Umsatz/Personalstunde: " + fmt(kAll.u / Math.max(totalStunden,1)) + " (Ziel €75)\n";

    // Mitarbeiter-Liste
    var maMap = {};
    ordio.forEach(function(r){
      if(!maMap[r.mitarbeiter])maMap[r.mitarbeiter]={stunden:0,kosten:0};
      maMap[r.mitarbeiter].stunden+=r.stunden;
      maMap[r.mitarbeiter].kosten+=r.kosten;
    });
    var maList = Object.entries(maMap).sort(function(a,b){return b[1].stunden-a[1].stunden;}).slice(0,10);
    ctx += "Top Mitarbeiter nach Stunden: " + maList.map(function(e){return e[0]+" ("+Math.round(e[1].stunden)+"h, "+fmt(e[1].kosten)+")";}).join(", ") + "\n\n";
  }

  // Waste
  if(waste.length > 0) {
    var totalWaste = waste.reduce(function(s,r){return s+r.kosten;},0);
    var wasteQuote = kAll.u > 0 ? totalWaste/kAll.u : 0;
    ctx += "=== WASTE (Apicbase) ===\n";
    ctx += "Waste gesamt: " + fmt(totalWaste) + " (" + fmtP(wasteQuote) + " vom Umsatz, Ziel <2%)\n";

    // Top Waste-Artikel
    var artWasteMap = {};
    waste.forEach(function(r){
      if(!artWasteMap[r.artikel])artWasteMap[r.artikel]={kosten:0,kategorie:r.kategorie};
      artWasteMap[r.artikel].kosten+=r.kosten;
    });
    var topWaste = Object.entries(artWasteMap).sort(function(a,b){return b[1].kosten-a[1].kosten;}).slice(0,5);
    ctx += "Top Waste-Artikel: " + topWaste.map(function(e){return e[0]+" ("+fmt(e[1].kosten)+", "+e[1].kategorie+")";}).join(", ") + "\n";

    // Kategorien
    var katMap = {};
    waste.forEach(function(r){
      if(!katMap[r.kategorie])katMap[r.kategorie]=0;
      katMap[r.kategorie]+=r.kosten;
    });
    ctx += "Waste nach Kategorie: " + Object.entries(katMap).sort(function(a,b){return b[1]-a[1];}).map(function(e){return e[0]+": "+fmt(e[1]);}).join(", ") + "\n\n";
  }

  // Artikel-Performance
  if(artikel.length > 0) {
    var artMap = {};
    artikel.filter(function(r){return r.storniert===0&&r.preisN>0;}).forEach(function(r){
      if(!artMap[r.name])artMap[r.name]={umsatz:0,menge:0,gruppe:r.gruppe};
      artMap[r.name].umsatz+=r.preisN;
      artMap[r.name].menge+=r.menge;
    });
    var topArt = Object.entries(artMap).sort(function(a,b){return b[1].umsatz-a[1].umsatz;}).slice(0,10);
    ctx += "=== TOP 10 ARTIKEL (nach Nettoumsatz) ===\n";
    topArt.forEach(function(e){
      ctx += e[0] + ": " + fmt(e[1].umsatz) + " | " + Math.round(e[1].menge) + "x verkauft | Ø " + fmtD(e[1].umsatz/Math.max(e[1].menge,1)) + "\n";
    });
    ctx += "\n";
  }

  // Trinkgeld
  if(bons.length > 0) {
    var bonsOhneLdo = bons.filter(function(r){return r.kanal!=="Lieferando";});
    var tkGesamt = bonsOhneLdo.reduce(function(s,r){return s+r.trinkgeld;},0);
    var totalOhneLdo = bonsOhneLdo.reduce(function(s,r){return s+r.total;},0);
    ctx += "=== TRINKGELD ===\n";
    ctx += "Trinkgeld gesamt (ohne Lieferando): " + fmt(tkGesamt) + " (" + fmtP(totalOhneLdo>0?tkGesamt/totalOhneLdo:0) + " Quote)\n\n";
  }

  // Zielwerte
  ctx += "=== ZIELWERTE ===\n";
  ctx += "Food Cost: 25% | Personal: 22% | Contribution Margin: 40% | EBITDA: 12% | Ø Bon-Wert: €22 | Umsatz/Personalstunde: €75\n";

  return ctx;
}

function aiInputKeydown(e) {
  if(e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendAiMessage();
  }
}

function askSuggestion(btn) {
  document.getElementById("ai-input").value = btn.textContent.replace(/^[^\s]+\s/,"");
  // Hide suggestions after first use
  document.getElementById("ai-suggestions").style.display = "none";
  sendAiMessage();
}

function addAiMessage(role, text) {
  var msgs = document.getElementById("ai-messages");
  var div = document.createElement("div");
  div.className = "ai-msg " + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendAiMessage() {
  if(aiThinking) return;
  var input = document.getElementById("ai-input");
  var text = input.value.trim();
  if(!text) return;

  input.value = "";
  document.getElementById("ai-suggestions").style.display = "none";
  addAiMessage("user", text);

  aiHistory.push({role:"user", content:text});
  aiThinking = true;
  document.getElementById("ai-send").disabled = true;

  var thinkingEl = addAiMessage("assistant thinking", "⏳ Analysiere deine Daten...");

  try {
    // System prompt mit allen Daten
    var systemPrompt = "Du bist ein erfahrener Restaurant-Betriebsanalyst für Bang Bang Noodles Berlin. " +
      "Du sprichst Deutsch, bist direkt, konkret und datenbasiert. " +
      "Keine langen Einleitungen — komm direkt zum Punkt. " +
      "Nenne immer konkrete Zahlen aus den Daten. " +
      "Wenn du Handlungsempfehlungen gibst, mach sie spezifisch und umsetzbar.\n\n" +
      buildAiContext();

    var apiKey = localStorage.getItem("bbn_ai_key") || "";
    if(!apiKey) {
      thinkingEl.remove();
      addAiMessage("assistant", "⚠️ Bitte zuerst den Anthropic API Key eingeben (oben im Chat-Fenster).");
      aiThinking = false;
      document.getElementById("ai-send").disabled = false;
      aiHistory.pop();
      return;
    }

    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: aiHistory
      })
    });

    var data = await response.json();

    if(data.error) throw new Error(data.error.message);

    var reply = data.content && data.content[0] ? data.content[0].text : "Keine Antwort erhalten.";
    thinkingEl.remove();
    addAiMessage("assistant", reply);
    aiHistory.push({role:"assistant", content:reply});

    // Badge anzeigen wenn Panel zu
    if(!aiOpen) {
      document.getElementById("ai-badge").classList.add("show");
    }

  } catch(e) {
    thinkingEl.remove();
    var errMsg = e.message || "Unbekannter Fehler";
    if(errMsg==="Failed to fetch") errMsg="Verbindung zur API fehlgeschlagen. API-Key prüfen oder später erneut versuchen.";
    else if(errMsg.includes("401") || errMsg.includes("auth")) errMsg="API-Key ungültig oder abgelaufen. Bitte neuen Key eingeben.";
    else if(errMsg.includes("429")) errMsg="Zu viele Anfragen — bitte kurz warten.";
    else if(errMsg.includes("overloaded")) errMsg="API überlastet — bitte in 1-2 Minuten erneut versuchen.";
    addAiMessage("assistant", "⚠️ " + errMsg);
    aiHistory.pop();
  } finally {
    aiThinking = false;
    document.getElementById("ai-send").disabled = false;
  }
}
</script>
