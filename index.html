function renderFoodCost(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;

  var k=kpi(gefiltert);
  var pk=hatStundenfilter()?getOrdioStunden(von,bis,st):getOrdio(von,bis,st);
  if(hatStundenfilter()){var uStdFC=getUmsatzGefiltert(von,bis,st);var avgFcQFC=getAvgFcQuote(st);k={u:uStdFC.u,f:uStdFC.u*avgFcQFC,s:k.s,t:k.t,fp:avgFcQFC,at:k.at};}
  var pa=pk.total>0?pk.total:k.u*0.33;

  // Waste filtern (immer voller Tag - wird dann anteilig berechnet)
  var wasteG=waste.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });

  // Bei Stundenfilter: Waste anteilig berechnen
  // Anteil = Artikel in Filterzeit / Artikel gesamt (ganzer Tag)
  var wasteAnteil = 1.0;
  var wasteAnteilMd = 1.0, wasteAnteilRs = 1.0;
  if(hatStundenfilter()){
    var artGesamt = artikel.filter(function(r){
      return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&datumPasstWT(r.datum)&&(r.gruppe==="Vorspeise"||r.gruppe==="Hauptgericht"||r.gruppe==="Main"||r.gruppe==="Starter"||r.gruppe==="main"||r.gruppe==="starter");
    });
    var artGFilter = getArtikelGefiltert(von,bis,st).filter(function(r){
      return r.storniert===0&&(r.gruppe==="Vorspeise"||r.gruppe==="Hauptgericht"||r.gruppe==="Main"||r.gruppe==="Starter"||r.gruppe==="main"||r.gruppe==="starter");
    });
    // Fallback: alle Artikel wenn keine Haupt/Vorspeisen gefunden
    if(artGesamt.length===0){
      artGesamt=artikel.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&datumPasstWT(r.datum);});
      artGFilter=getArtikelGefiltert(von,bis,st).filter(function(r){return r.storniert===0;});
    }
    var gesamtMenge=artGesamt.reduce(function(s,r){return s+r.menge;},0);
    var filterMenge=artGFilter.reduce(function(s,r){return s+r.menge;},0);
    wasteAnteil=gesamtMenge>0?filterMenge/gesamtMenge:0;
    // Pro Standort
    var artGesamtMd=artGesamt.filter(function(r){return r.standort==="Mehringdamm";}).reduce(function(s,r){return s+r.menge;},0);
    var artFilterMd=artGFilter.filter(function(r){return r.standort==="Mehringdamm";}).reduce(function(s,r){return s+r.menge;},0);
    wasteAnteilMd=artGesamtMd>0?artFilterMd/artGesamtMd:0;
    var artGesamtRs=artGesamt.filter(function(r){return r.standort==="Rosenthaler Straße";}).reduce(function(s,r){return s+r.menge;},0);
    var artFilterRs=artGFilter.filter(function(r){return r.standort==="Rosenthaler Straße";}).reduce(function(s,r){return s+r.menge;},0);
    wasteAnteilRs=artGesamtRs>0?artFilterRs/artGesamtRs:0;
  }

  var totalWaste=wasteG.reduce(function(s,r){return s+r.kosten;},0)*wasteAnteil;
  // Ist/Soll-Umschaltung: gleiche Logik wie Übersicht
  var rfcFC=getRealFC(st);
  var hatIstFC=istInBestandZeitraum(von,bis,rfcFC);
  var totalFC=hatIstFC?rfcFC.quote*k.u:k.f;
  var fcQuote=hatIstFC?rfcFC.quote:(k.u>0?k.f/k.u:0);
  var wareneinsatz=totalFC-totalWaste;
  var wasteQuote=k.u>0?totalWaste/k.u:0;
  var wareneinsatzQuote=k.u>0?wareneinsatz/k.u:0;
  var tage=new Set(gefiltert.map(function(r){return r.datum;})).size||1;

  // Waste nach Kategorie (anteilig bei Stundenfilter)
  var katMap={};
  wasteG.forEach(function(r){
    if(!katMap[r.kategorie])katMap[r.kategorie]={kosten:0,count:0};
    katMap[r.kategorie].kosten+=r.kosten*wasteAnteil;
    katMap[r.kategorie].count+=wasteAnteil;
  });
  var katList=Object.entries(katMap).sort(function(a,b){return b[1].kosten-a[1].kosten;});

  // Waste nach Standort
  var stWasteMap={};
  wasteG.forEach(function(r){
    if(!stWasteMap[r.standort])stWasteMap[r.standort]={kosten:0,count:0};
    stWasteMap[r.standort].kosten+=r.kosten;
    stWasteMap[r.standort].count++;
  });

  // Top 10 gewastete Artikel
  var artWasteMap={};
  wasteG.forEach(function(r){
    if(!artWasteMap[r.artikel])artWasteMap[r.artikel]={kosten:0,menge:0,kategorie:r.kategorie,events:new Set()};
    artWasteMap[r.artikel].kosten+=r.kosten;
    artWasteMap[r.artikel].menge+=r.menge;
    artWasteMap[r.artikel].events.add(r.eventId);
  });
  var topWaste=Object.entries(artWasteMap).sort(function(a,b){return b[1].kosten-a[1].kosten;}).slice(0,10);
  var maxWasteKosten=topWaste.length>0?topWaste[0][1].kosten:1;

  // Wareneinsatz pro Artikel (aus Lightspeed Artikel-Tab)
  var artG=hatStundenfilter()?
    getArtikelGefiltert(von,bis,st).filter(function(r){return r.storniert===0;}):
    artikel.filter(function(r){
      return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&datumPasstWT(r.datum);
    });
  var artUmsatzMap={};
  artG.forEach(function(r){
    if(!artUmsatzMap[r.name])artUmsatzMap[r.name]={umsatz:0,menge:0,gruppe:r.gruppe,fc:0,profit:0};
    artUmsatzMap[r.name].umsatz+=r.preisN;
    artUmsatzMap[r.name].menge+=r.menge;
  });
  // Item Sales (FC pro Artikel) einmergen
  var isG=itemSales.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  isG.forEach(function(r){
    if(artUmsatzMap[r.artikel]){
      artUmsatzMap[r.artikel].fc+=r.fc;
      artUmsatzMap[r.artikel].profit+=r.profit;
    }
  });
  var artUmsatzList=Object.entries(artUmsatzMap).sort(function(a,b){return b[1].umsatz-a[1].umsatz;}).slice(0,15);
  var maxArtUmsatz=artUmsatzList.length>0?artUmsatzList[0][1].umsatz:1;

  // Waste nach Tag für Chart — pro Standort
  var tagWasteMap={};
  var tagWasteMd={}, tagWasteRs={};
  wasteG.forEach(function(r){
    if(!tagWasteMap[r.datum])tagWasteMap[r.datum]=0;
    tagWasteMap[r.datum]+=r.kosten;
    if(r.standort==='Mehringdamm'){
      if(!tagWasteMd[r.datum])tagWasteMd[r.datum]=0;
      tagWasteMd[r.datum]+=r.kosten;
    } else {
      if(!tagWasteRs[r.datum])tagWasteRs[r.datum]=0;
      tagWasteRs[r.datum]+=r.kosten;
    }
  });
  var tagKeys=Object.keys(tagWasteMap).sort();

  // Per-Standort Berechnungen

    ${(function(){
      // === WARENWIRTSCHAFT BLOCK ===
      // Nutzt Dashboard-Zeitfilter (von/bis) um passende Inventur-Perioden zu finden.
      // Bei mehreren Perioden im Zeitraum: Werte aggregieren.
      // Fallback: neueste Periode falls keine im Zeitraum.

      if(bestandDaten.length===0){
        return '<div class="box"><div class="box-title">📦 Warenwirtschaft — Reale Food Cost</div>' +
          '<div style="color:#475569;font-size:12px;padding:12px 0">Noch keine Bestandsberichte verfügbar.</div></div>';
      }

      // Dashboard-Zeitfilter (YYYY-MM-DD)
      var dashVon = von; // aus renderFoodCost scope
      var dashBis = bis;

      // Alle einzigartigen Inventur-Perioden (von/bis Paare) pro Standort finden
      function getPeriodenKeys(st) {
        var keys = {};
        bestandDaten.filter(function(r){ return r.standort===st; }).forEach(function(r){
          var k = r.von + '|' + r.bis;
          if(!keys[k]) keys[k] = {von: r.von, bis: r.bis, vonISO: bestandDatISO(r.von), bisISO: bestandDatISO(r.bis)};
        });
        return Object.keys(keys).map(function(k){ return keys[k]; });
      }

      // Montag-Inventuren der Vorwoche zuordnen: Bis am Montag → zählt als Sonntag davor
      function normBis(isoDate){
        var d=new Date(isoDate+'T12:00:00');
        if(d.getDay()===1) d.setDate(d.getDate()-1); // Montag → Sonntag
        return d.toISOString().slice(0,10);
      }
      // Perioden filtern: normalisiertes Bis-Datum muss im Dashboard-Zeitraum liegen
      function getPassendePerioden(st) {
        var alle = getPeriodenKeys(st);
        var passend = alle.filter(function(p){
          var nb = normBis(p.bisISO);
          return nb >= dashVon && nb <= dashBis;
        });
        // Sortiert nach bis-Datum (neueste zuletzt)
        passend.sort(function(a,b){ return a.bisISO < b.bisISO ? -1 : a.bisISO > b.bisISO ? 1 : 0; });
        return passend;
      }

      // Fallback: neueste Periode
      function getNeueste(st) {
        var alle = getPeriodenKeys(st);
        if(!alle.length) return [];
        alle.sort(function(a,b){ return a.bisISO < b.bisISO ? -1 : a.bisISO > b.bisISO ? 1 : 0; });
        return [alle[alle.length-1]];
      }

      // KPIs über passende Perioden aggregieren
      function getKPIs(st) {
        var perioden = getPassendePerioden(st);
        var fallback = false;
        if(!perioden.length) {
          perioden = getNeueste(st);
          fallback = true;
        }
        if(!perioden.length) return {von:'',bis:'',offen:0,waren:0,verkauft:0,schluss:0,schwund:0,artikel:0,perioden:0,fallback:false};

        var gesOffen=0,gesWaren=0,gesVerkauft=0,gesSchluss=0,gesSchwund=0,gesArtikel=0;
        perioden.forEach(function(p){
          var rows = bestandDaten.filter(function(r){ return r.standort===st && r.von===p.von && r.bis===p.bis; });
          gesOffen   += rows.reduce(function(s,r){return s+r.offen;},0);
          gesWaren   += rows.reduce(function(s,r){return s+r.waren;},0);
          gesVerkauft+= rows.reduce(function(s,r){return s+r.verkauft;},0);
          gesSchluss += rows.reduce(function(s,r){return s+r.schluss;},0);
          gesSchwund += rows.reduce(function(s,r){return s+r.unkontrolliert;},0);
          gesArtikel += rows.length;
        });

        // Zeitraum-Anzeige: frühestes von → spätestes bis
        var vonDisplay = perioden[0].von;
        var bisDisplay = perioden[perioden.length-1].bis;

        return {
          von: vonDisplay, bis: bisDisplay,
          offen: gesOffen, waren: gesWaren, verkauft: gesVerkauft,
          schluss: gesSchluss, schwund: gesSchwund,
          artikel: gesArtikel, perioden: perioden.length, fallback: fallback
        };
      }

      // Schwund-Artikel über alle passenden Perioden sammeln
      function getSchwundRows(st) {
        var perioden = getPassendePerioden(st);
        if(!perioden.length) perioden = getNeueste(st);
        if(!perioden.length) return [];
        var allRows = [];
        perioden.forEach(function(p){
          var rows = bestandDaten.filter(function(r){ return r.standort===st && r.von===p.von && r.bis===p.bis && r.unkontrolliert!==0; });
          allRows = allRows.concat(rows);
        });
        // Bei mehreren Perioden: gleiche Artikel aggregieren
        if(perioden.length > 1) {
          var byArtikel = {};
          allRows.forEach(function(r){
            if(!byArtikel[r.artikel]) byArtikel[r.artikel] = {artikel:r.artikel, unkontrolliert:0};
            byArtikel[r.artikel].unkontrolliert += r.unkontrolliert;
          });
          allRows = Object.keys(byArtikel).map(function(k){ return byArtikel[k]; });
        }
        return allRows;
      }

      function getTopSchwund(st, limit) {
        var rows = getSchwundRows(st);
        return rows.slice().sort(function(a,b){ return a.unkontrolliert-b.unkontrolliert; }).slice(0,limit||5);
      }

      function getAllSchwund(st, minAbs) {
        var rows = getSchwundRows(st);
        return rows.filter(function(r){ return Math.abs(r.unkontrolliert)>=minAbs; })
                   .sort(function(a,b){ return a.unkontrolliert-b.unkontrolliert; });
      }

      var kpiMd = getKPIs('Mehringdamm');
      var kpiRs = getKPIs('Rosenthaler Straße');
      var schwundMd = getTopSchwund('Mehringdamm', 5);
      var schwundRs = getTopSchwund('Rosenthaler Straße', 5);

      var schwundAllRs = getAllSchwund('Rosenthaler Straße', 5);

      function stCard(emoji, stName, kpi, color) {
        var realFC = kpi.offen + kpi.waren - kpi.schluss;

        return '<div style="background:#0a1628;border-radius:10px;padding:16px;border:1px solid #0a3545">' +

            '</div>' +
          '</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">' +
            '<div style="text-align:center;padding:6px 4px;background:#0f172a;border-radius:6px">' +

              '<div style="font-size:9px;color:#475569">Endbestand</div><div style="font-size:12px;font-weight:600;color:#94a3b8">'+fmt(kpi.schluss)+'</div></div>' +
          '</div>' +
        '</div>';

      function schwundListe(rows) {
        if(!rows.length) return '<div style="color:#475569;font-size:11px;padding:4px 0">Keine Abweichungen</div>';
        return rows.map(function(r) {
          var col = r.unkontrolliert < 0 ? '#ef4444' : '#22c55e';

      return '<div class="box">' +

          stCard('🟠', 'Mehringdamm', kpiMd, '#E84393') +

        '</div>' +
        '<div class="grid2" style="margin-top:14px;align-items:start">' +
          '<div style="background:#0a1628;border-radius:10px;padding:14px;border:1px solid #0a3545">' +

// SPEISEKARTE — echte Lightspeed Artikel-Daten
// ============================================================
function renderSpeisekarte(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;

  var artG=hatStundenfilter()?
    getArtikelGefiltert(von,bis,st).filter(function(r){return r.storniert===0;}):
    artikel.filter(function(r){
      return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&datumPasstWT(r.datum);
    });

  if(artG.length===0){
    document.getElementById("t-speisekarte").innerHTML='<div class="box" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">🍽️</div><div style="color:#475569">Keine Artikel-Daten für diesen Zeitraum.</div><div style="color:#334155;font-size:12px;margin-top:6px">Lightspeed Artikel-Import läuft täglich ab 08:00.</div></div>';
    return;
  }

  // Artikel aggregieren
  var artMap={};
  artG.forEach(function(r){
    if(!artMap[r.name])artMap[r.name]={name:r.name,gruppe:r.gruppe,menge:0,umsatz:0,stornos:0,bons:new Set()};
    artMap[r.name].menge+=r.menge;
    artMap[r.name].umsatz+=r.preisN;
    artMap[r.name].bons.add(r.bonNr);
  });

  // Stornos aus stornoDetails (15_ls_stornos) — konsistent mit Stornierungen-Tab
  var sdSpeise=stornoDetails.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.betrag<0&&datumPasstWT(r.datum);
  });
  sdSpeise.forEach(function(r){
    if(artMap[r.artikel])artMap[r.artikel].stornos++;
  });

  var alleArtikel=Object.values(artMap).sort(function(a,b){return b.umsatz-a.umsatz;});
  var speise=alleArtikel.slice(0,30); // Top 30 anzeigen

  var maxUmsatz=speise.length>0?speise[0].umsatz:1;
  var totalUmsatz=alleArtikel.reduce(function(s,g){return s+g.umsatz;},0);
  var totalMenge=speise.reduce(function(s,g){return s+g.menge;},0);
  var totalStornos=speise.reduce(function(s,g){return s+g.stornos;},0);

  // Gruppen
  var gruppenMap={};
  artG.forEach(function(r){
    if(!gruppenMap[r.gruppe])gruppenMap[r.gruppe]={umsatz:0,menge:0};
    gruppenMap[r.gruppe].umsatz+=r.preisN;
    gruppenMap[r.gruppe].menge+=r.menge;
  });
  var gruppen=Object.entries(gruppenMap).sort(function(a,b){return b[1].umsatz-a[1].umsatz;});

  // Storno-Top
  var topStornos=Object.values(artMap).filter(function(g){return g.stornos>0;})
    .sort(function(a,b){return b.stornos-a.stornos;}).slice(0,5);

  var tage=new Set(artG.map(function(r){return r.datum;})).size||1;

  // Renner/Penner Logik
  // Schwellen für Renner/Penner: Median aller Artikel
  var alleUmsatzTag = alleArtikel.map(function(g){return g.umsatz/tage;}).sort(function(a,b){return a-b;});
  var medianIdx = Math.floor(alleUmsatzTag.length/2);
  var avgUmsatzTag = alleUmsatzTag.length>0 ? alleUmsatzTag[medianIdx] : 0;
  var alleAnteile = alleArtikel.map(function(g){return totalUmsatz>0?g.umsatz/totalUmsatz:0;}).sort(function(a,b){return a-b;});
  var avgAnteil = alleAnteile.length>0 ? alleAnteile[medianIdx] : 0;

  function rennerPenner(g) {
    var anteilPct = totalUmsatz>0 ? g.umsatz/totalUmsatz : 0;
    var umsatzProTag = g.umsatz/tage;
    var hoherAnteil = anteilPct >= avgAnteil;
    var hoheGeschw  = umsatzProTag >= avgUmsatzTag;
    if(hoherAnteil && hoheGeschw)  return {badge:'🟢 Renner',     color:'#22c55e', grund:'Hoher Umsatzanteil ('+( anteilPct*100).toFixed(1)+'%) und hohe Verkaufsgeschwindigkeit ('+fmtD(umsatzProTag)+'/Tag). Priorität bei Verfügbarkeit und Qualität.'};
    if(!hoherAnteil && hoheGeschw) return {badge:'🟡 Schnelldreher', color:'#f59e0b', grund:'Oft bestellt aber geringer Umsatzanteil ('+( anteilPct*100).toFixed(1)+'%). Günstiger Artikel der Volumen macht — prüfe ob Preis erhöhbar.'};
    if(hoherAnteil && !hoheGeschw) return {badge:'🟠 Schläfer',   color:'#E84393', grund:'Hoher Umsatzanteil ('+( anteilPct*100).toFixed(1)+'%) aber selten bestellt. Teurer Artikel — gezielt promoten oder besser platzieren.'};
    return                                {badge:'🔴 Penner',      color:'#ef4444', grund:'Geringer Umsatzanteil ('+( anteilPct*100).toFixed(1)+'%) und niedrige Verkaufsgeschwindigkeit ('+fmtD(umsatzProTag)+'/Tag). Überdenken oder streichen.'};
  }

  var tableRows=speise.map(function(g,i){
    var stornoRate=g.menge>0?(g.stornos/g.menge*100).toFixed(1):0;
    var avgPreis=g.menge>0?g.umsatz/g.menge:0;
    var anteil=totalUmsatz>0?(g.umsatz/totalUmsatz*100).toFixed(1):0;
    var rp=rennerPenner(g);
    return'<tr onclick="drillSpeise('+i+')" style="cursor:pointer">'+
      '<td style="padding:8px 6px;font-size:12px">'+
        '<div style="font-weight:600;color:#f1f5f9">'+g.name+'</div>'+
        '<div style="margin-top:3px"><span style="font-size:10px;font-weight:600;color:'+rp.color+'">'+rp.badge+'</span></div>'+
      '</td>'+
      '<td style="padding:8px 6px;text-align:right;color:#64748b;font-size:12px">'+g.gruppe+'</td>'+

      '<td style="padding:8px 6px;text-align:right;color:#64748b;font-size:12px">'+anteil+'%</td>'+
      '<td style="padding:8px 6px;text-align:right;font-size:12px"><span style="color:'+(g.stornos>0?'#ef4444':'#64748b')+'">'+g.stornos+'x ('+stornoRate+'%)</span></td>'+
    '</tr>'+
    '<tr id="sp-'+i+'" style="display:none"><td colspan="7">'+
      '<div class="drill-panel open" style="margin:4px 6px 8px">'+

        '<div class="drill-row"><span>Verkäufe gesamt</span><span>'+Math.round(g.menge)+'x</span></div>'+
        '<div class="drill-row"><span>Ø Verkäufe/Tag</span><span>'+(g.menge/tage).toFixed(1)+'x</span></div>'+
        '<div class="drill-row"><span>Umsatz gesamt</span><span>'+fmt(g.umsatz)+'</span></div>'+
        '<div class="drill-row"><span>Ø Preis/Einheit</span><span>'+fmtD(avgPreis)+'</span></div>'+
        '<div class="drill-row"><span>Umsatz-Anteil</span><span>'+anteil+'%</span></div>'+
        '<div class="drill-row"><span>Umsatz/Tag</span><span>'+fmtD(g.umsatz/tage)+'</span></div>'+
        '<div class="drill-row"><span>Stornierungen</span><span style="color:'+(g.stornos>0?'#ef4444':'#22c55e')+'">'+g.stornos+'x ('+stornoRate+'%)</span></div>'+
        '<div class="drill-row"><span>Gruppe</span><span>'+g.gruppe+'</span></div>'+
        '<div class="ai-box">'+(g.stornos>3?'⚠️ Hohe Storno-Rate ('+stornoRate+'%) — Qualitätsproblem prüfen. ':'')+
          (g.umsatz/totalUmsatz>0.1?'Top-Umsatzbringer: '+anteil+'% des Gesamtumsatzes. ':'')+
          (g.menge/tage>10?'Sehr häufig bestellt ('+( g.menge/tage).toFixed(1)+'x/Tag). ':'')+'</div>'+
      '</div>'+
    '</td></tr>';
  }).join("");

  document.getElementById("t-speisekarte").innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Artikel-Positionen</div>
        <div class="kpi-val" style="color:#E84393">${Math.round(totalMenge).toLocaleString("de-DE")}</div>
        <div class="kpi-delta delta-neu">Ø ${(totalMenge/tage).toFixed(0)}/Tag · ${tage} Tage</div>
        <div class="kpi-ai">${speise.length} verschiedene Artikel</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Umsatz aus Artikeln</div>
        <div class="kpi-val" style="color:#22c55e">${fmt(totalUmsatz)}</div>
        <div class="kpi-delta delta-neu">Ø ${fmtD(totalUmsatz/Math.max(totalMenge,1))}/Artikel</div>
        <div class="kpi-ai">Top-Artikel: ${speise.length>0?speise[0].name:"-"}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Stornierungen gesamt</div>
        <div class="kpi-val" style="color:${totalStornos>0?'#ef4444':'#22c55e'}">${totalStornos}</div>
        <div class="kpi-delta ${totalStornos>0?'delta-dn':'delta-up'}">${totalMenge>0?(totalStornos/totalMenge*100).toFixed(1):0}% Storno-Rate</div>
        <div class="kpi-ai">${topStornos.length>0?"Meiste Stornos: "+topStornos[0].name+" ("+topStornos[0].stornos+"x)":"Keine Stornos"}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Kategorien</div>
        <div class="kpi-val" style="color:#E84393">${gruppen.length}</div>
        <div class="kpi-delta delta-neu">Top: ${gruppen.length>0?gruppen[0][0]:"-"}</div>
        <div class="kpi-ai">${gruppen.length>0?fmt(gruppen[0][1].umsatz)+" ("+( gruppen[0][1].umsatz/totalUmsatz*100).toFixed(1)+"%)":""}</div>
      </div>
    </div>

    <div class="box">
      <div class="box-title">🍽️ Artikel-Performance</div>

// ============================================================
// STORNO-DETAIL-ANALYSE (aus 15_ls_stornos)
// ============================================================
function renderStornoAnalyse(von,bis,st){
  var sd=stornoDetails.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });
  if(sd.length===0) return '';

  // Nach Stornodefinition — nur Artikel mit negativem Betrag
  var defMap={};
  sd.filter(function(r){return r.betrag<0;}).forEach(function(r){
    var d=r.stornodefinition||"Unbekannt";
    if(!defMap[d])defMap[d]={count:0,betrag:0,bons:{}};
    defMap[d].count++;
    defMap[d].bons[r.quittungsId]=1;
    defMap[d].betrag+=r.betrag;
  });
  var defList=Object.entries(defMap).sort(function(a,b){return b[1].count-a[1].count;});
  var defColors={"Fehleintrag":"#FF8000","Bruch":"#ef4444","Unzufriedener Gast":"#E84393","Andere":"#64748b"};

  // Nach Mitarbeiter (Storniert von) — nur Artikel mit negativem Betrag
  var maMap={};
  sd.filter(function(r){return r.betrag<0;}).forEach(function(r){
    var ma=r.storniertVon||r.eroeffnetVon||"Unbekannt";
    if(!maMap[ma])maMap[ma]={count:0,betrag:0,bons:{}};
    maMap[ma].count++;
    maMap[ma].bons[r.quittungsId]=1;
    maMap[ma].betrag+=r.betrag;
  });
  var maList=Object.entries(maMap).sort(function(a,b){return b[1].count-a[1].count;});

  // Nach Artikel (Top 8)
  var sdMitBetrag=sd.filter(function(r){return r.betrag<0;});
  var artMap={};
  sdMitBetrag.forEach(function(r){
    if(!artMap[r.artikel])artMap[r.artikel]={count:0,betrag:0};
    artMap[r.artikel].count++;
    artMap[r.artikel].betrag+=r.betrag;
  });
  var artList=Object.entries(artMap).sort(function(a,b){return b[1].count-a[1].count;}).slice(0,8);
  var maxArt=artList.length>0?artList[0][1].count:1;

  // Layout: Stornogründe (links) + Storniert von (rechts)
  return '<div class="grid2" style="align-items:start;margin-top:14px">'+

    // LINKS: Stornogründe + Donut
    '<div class="box">'+
      '<div class="box-title">📋 Stornogründe</div>'+
      '<div class="box-sub">Warum wurde storniert?</div>'+
      '<div style="display:flex;gap:14px;align-items:center;margin-top:10px">'+
        '<div style="flex:1">'+
          defList.map(function(e){
            var name=e[0],d=e[1];
            var col=defColors[name]||"#94a3b8";
            var pct=sdMitBetrag.length>0?(d.count/sdMitBetrag.length*100).toFixed(0):0;
            var bonCount=Object.keys(d.bons).length;
            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e2d40">'+
              '<div style="width:10px;height:10px;border-radius:50%;background:'+col+';flex-shrink:0"></div>'+
              '<span style="color:'+col+';font-weight:600;font-size:12px;white-space:nowrap">'+d.count+' Pos. · '+bonCount+' Bons</span>'+
              '<span style="color:#f1f5f9;font-weight:500;flex:1;font-size:12px">'+name+'</span>'+
              '<span style="color:#64748b;font-size:11px;width:40px;text-align:right">'+pct+'%</span>'+
            '</div>';
          }).join("")+
        '</div>'+
        '<div style="width:180px;flex-shrink:0"><canvas id="c-storno-def" style="max-height:180px"></canvas></div>'+
      '</div>'+
      (defMap["Andere"]&&sdMitBetrag.length>0&&defMap["Andere"].count/sdMitBetrag.length>0.5?
        '<div class="ai-box" style="margin-top:10px">⚠️ '+((defMap["Andere"].count/sdMitBetrag.length*100).toFixed(0))+'% der Stornos haben den Grund "Andere" — Team sollte spezifische Gründe wählen.</div>':'')+
    '</div>'+

    // RECHTS: Storniert von (Mitarbeiter)
    '<div class="box">'+
      '<div class="box-title">👤 Storniert von</div>'+
      '<div class="box-sub">Welche Mitarbeiter stornieren?</div>'+
      maList.map(function(e){
        var name=e[0],d=e[1];
        var bonCount=Object.keys(d.bons).length;
        return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid #1e2d40">'+
          '<span style="color:#cbd5e1;font-weight:500">'+name+'</span>'+
          '<span style="display:flex;gap:8px;align-items:center">'+
            '<span style="color:#94a3b8;font-size:11px">'+bonCount+' Bons</span>'+
            '<span style="color:#ef4444;font-weight:600">'+d.count+' Pos.</span>'+
            '<span style="color:#64748b;font-size:11px">'+fmt(d.betrag)+'</span>'+
          '</span>'+
        '</div>';
      }).join("")+
    '</div>'+

  '</div>'+

  // UNTEN: Vollständige Storno-Detailtabelle (volle Breite)
  (function(){
    function fmtDatS(d){if(!d)return"–";var p=d.split("-");return p[2]+"."+p[1]+"."+p[0];}
    function fmtWdayS(d){if(!d)return"";var wd=["So","Mo","Di","Mi","Do","Fr","Sa"];return wd[new Date(d).getDay()]||"";}
    var rows=sdMitBetrag.slice().sort(function(a,b){return b.datum>a.datum?1:b.datum<a.datum?-1:0;});
    var totalBetrag=rows.reduce(function(s,r){return s+r.betrag;},0);
    return '<div class="box" style="margin-top:14px">'+
      '<div class="box-title">📋 Alle stornierten Artikel</div>'+
      '<div class="box-sub">'+rows.length+' Positionen · Stornowert: '+fmt(totalBetrag)+'</div>'+
      '<div style="overflow-x:auto">'+
      '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:10px">'+
      '<thead><tr style="border-bottom:2px solid #1e2d40">'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Datum</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Artikel</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Storniert von</th>'+
        '<th style="text-align:right;padding:6px 4px;color:#64748b;font-weight:600">Betrag</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Tisch</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Quittung</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Grund</th>'+
        '<th style="text-align:left;padding:6px 4px;color:#64748b;font-weight:600">Standort</th>'+
      '</tr></thead><tbody>'+
      rows.map(function(r,ri){
        var ma=r.storniertVon||r.eroeffnetVon||"–";
        var stK=(r.standort||"").indexOf("Mehring")!==-1?"MD":"RS";
        var grund=r.stornodefinition||"–";
        return '<tr style="border-bottom:1px solid #1e2d4060;background:'+(ri%2===0?"transparent":"#0a1520")+'">'+
          '<td style="padding:4px;color:#94a3b8;white-space:nowrap">'+fmtWdayS(r.datum)+' '+fmtDatS(r.datum)+'</td>'+
          '<td style="padding:4px;color:#f1f5f9">'+r.artikel+'</td>'+
          '<td style="padding:4px;color:#c084fc">'+ma+'</td>'+
          '<td style="padding:4px;text-align:right;color:#ef4444;font-weight:600">'+fmt(r.betrag)+'</td>'+
          '<td style="padding:4px;color:#94a3b8;font-size:10px">'+(r.kontoName||"–")+'</td>'+
          '<td style="padding:4px;color:#64748b;font-size:10px">'+(r.quittungsId||"–")+'</td>'+
          '<td style="padding:4px;color:#94a3b8;font-size:10px">'+grund+'</td>'+
          '<td style="padding:4px;color:#94a3b8;font-size:10px">'+stK+'</td>'+
        '</tr>';
      }).join("")+
      '<tr style="border-top:2px solid #1e2d40;font-weight:700">'+
        '<td style="padding:6px 4px;color:#f1f5f9">Gesamt</td>'+
        '<td style="padding:6px 4px;color:#f1f5f9">'+rows.length+' Positionen</td>'+
        '<td></td>'+
        '<td style="padding:6px 4px;text-align:right;color:#ef4444;font-weight:700;font-size:13px">'+fmt(totalBetrag)+'</td>'+
        '<td colspan="4"></td>'+
      '</tr>'+
      '</tbody></table></div></div>';
  })()+

  // Storno-Trend pro Woche
  '<canvas id="c-storno-trend" style="max-height:120px;margin-top:14px"></canvas>'+
  '<div style="font-size:11px;color:#475569;margin-top:4px">Storno-Trend pro Woche (Anzahl Positionen + Wert)</div>';
}

// TRINKGELD & STORNOS
// ============================================================
function renderTrinkgeld(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;

  var bonsG=hatStundenfilter()?getBonsGefiltert(von,bis,st):bons.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });

  if(bonsG.length===0){
    document.getElementById("t-trinkgeld").innerHTML='<div class="box" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">💝</div><div style="color:#475569">Keine Bon-Daten für diesen Zeitraum.</div></div>';
    return;
  }

  // Gesamt-Stats
  var bonsOhneLdo=bonsG.filter(function(r){return r.kanal!=="Lieferando";});
  var tkGesamt=bonsG.reduce(function(s,r){return s+r.trinkgeld;},0);
  var tkOhneLdo=bonsOhneLdo.reduce(function(s,r){return s+r.trinkgeld;},0);
  var totalOhneLdo=bonsOhneLdo.reduce(function(s,r){return s+r.total;},0);
  var tkQuoteGesamt=totalOhneLdo>0?tkOhneLdo/totalOhneLdo:0;
  // Online Order vs Mitarbeiter
  var bonsOnline=bonsG.filter(function(r){return r.mitarbeiter==="Online Order"||r.mitarbeiter.indexOf("Online")!==-1;});
  var bonsMitarb=bonsG.filter(function(r){return r.mitarbeiter!=="Online Order"&&r.mitarbeiter.indexOf("Online")===-1&&r.kanal!=="Lieferando"&&r.mitarbeiter.indexOf(",")===-1;});
  var tkOnline=bonsOnline.reduce(function(s,r){return s+r.trinkgeld;},0);
  var totalOnline=bonsOnline.reduce(function(s,r){return s+r.total;},0);
  var tkMitarb=bonsMitarb.reduce(function(s,r){return s+r.trinkgeld;},0);
  var totalMitarb=bonsMitarb.reduce(function(s,r){return s+r.total;},0);
  var quoteOnline=totalOnline>0?tkOnline/totalOnline:0;
  var quoteMitarb=totalMitarb>0?tkMitarb/totalMitarb:0;

  // Nach Mitarbeiter (ohne Online Order, ohne LDO)
  var maMap={};
  bonsMitarb.forEach(function(r){
    var ma=r.mitarbeiter||"Unbekannt";
    if(!maMap[ma])maMap[ma]={tk:0,total:0,bons:0};
    maMap[ma].tk+=r.trinkgeld;maMap[ma].total+=r.total;maMap[ma].bons++;
  });
  var maList=Object.entries(maMap).filter(function(e){return e[1].bons>0;})
    .sort(function(a,b){return (b[1].tk/Math.max(b[1].total,1))-(a[1].tk/Math.max(a[1].total,1));});
  var maxTk=maList.length>0?Math.max.apply(null,maList.map(function(e){return e[1].tk;})):1;

  // Nach Stunde
  var stundenMap={};
  bonsOhneLdo.forEach(function(r){
    if(r.stunde<0)return;
    if(!stundenMap[r.stunde])stundenMap[r.stunde]={tk:0,total:0,bons:0};
    stundenMap[r.stunde].tk+=r.trinkgeld;
    stundenMap[r.stunde].total+=r.total;
    stundenMap[r.stunde].bons++;
  });
  var stundenKeys=Object.keys(stundenMap).sort(function(a,b){return parseInt(a)-parseInt(b);});

  // Nach Kanal
  var kanalMap={};
  bonsG.forEach(function(r){
    if(!kanalMap[r.kanal])kanalMap[r.kanal]={tk:0,total:0,bons:0};
    kanalMap[r.kanal].tk+=r.trinkgeld;kanalMap[r.kanal].total+=r.total;kanalMap[r.kanal].bons++;
  });

  document.getElementById("t-trinkgeld").innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Trinkgeld gesamt</div>
        <div class="kpi-val" style="color:#E84393">${fmt(tkGesamt)}</div>
        <div class="kpi-delta delta-up">inkl. Online Order</div>
        <div class="kpi-ai">Ohne Lieferando: ${fmt(tkOhneLdo)} · Quote: ${fmtP(tkQuoteGesamt)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Online Order TK-Quote</div>
        <div class="kpi-val" style="color:#00EEFC">${fmtP(quoteOnline)}</div>
        <div class="kpi-delta delta-neu">${bonsOnline.length} Bons · ${fmt(tkOnline)}</div>
        <div class="kpi-ai">QR-Code Bestellungen am Tisch</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Service TK-Quote</div>
        <div class="kpi-val" style="color:#22c55e">${fmtP(quoteMitarb)}</div>
        <div class="kpi-delta delta-neu">${bonsMitarb.length} Bons · ${fmt(tkMitarb)}</div>
        <div class="kpi-ai">Klassischer Tischservice · ohne Online/LDO</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Ø Trinkgeld pro Bon</div>
        <div class="kpi-val" style="color:#E84393">${bonsOhneLdo.length>0?fmtD(tkOhneLdo/bonsOhneLdo.length):'€ 0'}</div>
        <div class="kpi-delta delta-neu">${bonsOhneLdo.length} Bons (ohne LDO)</div>
        <div class="kpi-ai">${maList.length>0?'Bester MA: '+maList[0][0]:'–'}</div>
      </div>
    </div>

    <div class="alert">
      <b>Online Order vs. Service:</b>
      Online Order TK-Quote ${fmtP(quoteOnline)} (${bonsOnline.length} Bons) vs.
      Service TK-Quote ${fmtP(quoteMitarb)} (${bonsMitarb.length} Bons).
      ${quoteOnline>quoteMitarb?"Online Order Gäste geben mehr Trinkgeld — typisch für anonyme QR-Code Bestellungen.":"Service-Mitarbeiter erzielen höhere TK-Quote als Online Order."}
      ${maList.length>0?" Bester Service-MA: "+maList[0][0]+" ("+fmtP(maList[0][1].tk/Math.max(maList[0][1].total,1))+" Quote).":""}
    </div>

    <div class="box">
      <div class="box-title">📈 Trinkgeld-Quote im Zeitverlauf</div>
      <div class="box-sub">TK-Quote pro Tag (Service ohne Online Order & Lieferando)</div>
      <canvas id="c-tk-zeit" style="max-height:180px"></canvas>
    </div>

    <div class="grid2">
      <div class="box">
        <div class="box-title">👤 Trinkgeld nach Mitarbeiter</div>
        <div class="box-sub">Nur Service (ohne Online Order & Lieferando)</div>
        ${maList.length>0?maList.map(function(e){
          var name=e[0],d=e[1];
          var quote=d.total>0?d.tk/d.total:0;
          var pct=maxTk>0?Math.round(d.tk/maxTk*100):0;
          var col=quote>0.03?"#22c55e":quote>0.02?"#00EEFC":"#E84393";
          return'<div style="margin-bottom:12px;cursor:pointer" onclick="drill(\'d-tk-ma-'+name.replace(/[\s\W]/g,'')+'\')">'+
            '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'+
              '<span style="color:#f1f5f9;font-weight:600">'+name+'</span>'+
              '<span style="display:flex;gap:10px">'+
                '<span style="color:'+col+';font-weight:600">'+fmtP(quote)+' Quote</span>'+
                '<span style="color:#E84393">'+fmt(d.tk)+'</span>'+
              '</span>'+
            '</div>'+
            '<div style="height:4px;background:#1e2d40;border-radius:2px">'+
              '<div style="height:100%;background:'+col+';border-radius:2px;width:'+pct+'%"></div>'+
            '</div>'+
            '<div id="d-tk-ma-'+name.replace(/[\s\W]/g,'')+'" class="drill-panel">'+
              '<div class="drill-row"><span>Bons</span><span>'+d.bons+'</span></div>'+
              '<div class="drill-row"><span>Umsatz betreut</span><span>'+fmt(d.total)+'</span></div>'+
              '<div class="drill-row"><span>Trinkgeld</span><span style="color:#E84393">'+fmt(d.tk)+'</span></div>'+
              '<div class="drill-row"><span>TK-Quote</span><span style="color:'+col+'">'+fmtP(quote)+'</span></div>'+
              '<div class="ai-box">'+name+': '+fmtP(quote)+' Trinkgeld-Quote bei '+d.bons+' Bons. '+
                (quote>0.03?'Überdurchschnittlich guter Service.':quote>0.02?'Durchschnittliche Performance.':'Unter Durchschnitt — Training oder Schichtzuteilung prüfen.')+'</div>'+
            '</div>'+
          '</div>';
        }).join(""):'<div style="color:#475569;font-size:12px">Keine Service-Mitarbeiter-Daten</div>'}
      </div>

      <div class="box">
        <div class="box-title">💳 Nach Kanal</div>
        <div class="box-sub">Trinkgeld-Verteilung</div>
        ${Object.entries(kanalMap).map(function(e){
          var name=e[0],d=e[1];
          var quote=d.total>0?d.tk/d.total:0;
          return'<div style="padding:10px 0;border-bottom:1px solid #1e2d40">'+
            '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">'+
              '<span style="color:#f1f5f9;font-weight:600">'+name+'</span>'+
              '<span style="color:#E84393">'+fmt(d.tk)+'</span>'+
            '</div>'+
            '<div style="display:flex;justify-content:space-between;font-size:11px;color:#475569">'+
              '<span>'+d.bons+' Bons · Umsatz: '+fmt(d.total)+'</span>'+
              '<span style="color:'+(name==="Lieferando"?'#475569':'#22c55e')+'">Quote: '+fmtP(quote)+(name==="Lieferando"?" (kein Service-TK)":"")+'</span>'+
            '</div>'+
          '</div>';
        }).join("")}
        <div class="ai-box" style="margin-top:10px">
          ${quoteOnline>quoteMitarb?
            "Online Order generiert mehr Trinkgeld pro Bon als klassischer Service. Das ist normal — Gäste geben beim digitalen Bezahlen eher automatisch Trinkgeld.":
            "Klassischer Service erzielt höhere TK-Quote. Mitarbeiter-Interaktion zahlt sich aus."}
        </div>
      </div>
    </div>

    <div class="box">
      <div class="box-title">⏰ Trinkgeld nach Uhrzeit</div>
      <div class="box-sub">TK-Quote pro Stunde (ohne Lieferando)</div>
      <canvas id="c-tk-std" style="max-height:160px"></canvas>
    </div>

    <div class="box" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="box-title">🤖 KI-Analyse: Trinkgeld</div><div class="box-sub">Automatische Bewertung der Servicequalität</div></div>
        <button id="btn-report-trinkgeld" onclick="generateTabReport('trinkgeld')" style="background:#E84393;border:none;border-radius:6px;padding:6px 14px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">🤖 Bericht generieren</button>
      </div>
      <div id="tab-report-trinkgeld" style="display:none;margin-top:12px;border-top:1px solid #0a3545;padding-top:12px"></div>
    </div>`;

  // Charts
  // TK-Quote im Zeitverlauf
  dc("c-tk-zeit");
  var tkZeitMap={};
  bonsG.filter(function(r){return r.kanal!=="Lieferando"&&r.mitarbeiter.indexOf(",")===-1;}).forEach(function(r){
    if(!tkZeitMap[r.datum])tkZeitMap[r.datum]={tk:0,total:0};
    tkZeitMap[r.datum].tk+=r.trinkgeld;
    tkZeitMap[r.datum].total+=r.total;
  });
  var tkZeitKeys=Object.keys(tkZeitMap).sort();
  if(tkZeitKeys.length>0){
    charts["c-tk-zeit"]=new Chart(document.getElementById("c-tk-zeit"),{
      type:"line",
      data:{
        labels:tkZeitKeys.map(function(d){return d.slice(8)+"."+d.slice(5,7);}),
        datasets:[{
          label:"TK-Quote %",
          data:tkZeitKeys.map(function(d){return Math.round(tkZeitMap[d].tk/Math.max(tkZeitMap[d].total,1)*1000)/10;}),
          borderColor:"#E84393",backgroundColor:"#E8439320",fill:true,tension:0.4,pointRadius:3,borderWidth:2
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:"#475569",font:{size:9},maxTicksLimit:12},grid:{color:"#1e2d40"}},
          y:{ticks:{color:"#475569",font:{size:9},callback:function(v){return v+"%";}},grid:{color:"#1e2d40"}}
        }
      }
    });
  }

  dc("c-tk-std");
  if(stundenKeys.length>0){
    charts["c-tk-std"]=new Chart(document.getElementById("c-tk-std"),{
      type:"bar",
      data:{
        labels:stundenKeys.map(function(h){return h+":00";}),
        datasets:[
          {label:"TK-Quote %",data:stundenKeys.map(function(h){return Math.round(stundenMap[h].tk/Math.max(stundenMap[h].total,1)*100*10)/10;}),backgroundColor:"#E84393",borderRadius:3,yAxisID:"y1"},
          {label:"Trinkgeld €",data:stundenKeys.map(function(h){return Math.round(stundenMap[h].tk);}),type:"line",borderColor:"#22c55e",backgroundColor:"transparent",tension:0.4,pointRadius:4,yAxisID:"y2"}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
        x:{ticks:{color:"#475569",font:{size:10}},grid:{color:"#1e2d40"}},
        y1:{ticks:{color:"#E84393",font:{size:9},callback:function(v){return v+"%";}},grid:{color:"#1e2d40"},position:"left"},
        y2:{ticks:{color:"#22c55e",font:{size:9},callback:function(v){return"€"+v;}},grid:{display:false},position:"right"}
      }}
    });
  }

}

// STORNIERUNGEN (eigenes Tab)
// ============================================================
function renderStornierungen(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;

  var bonsG=hatStundenfilter()?getBonsGefiltert(von,bis,st):bons.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });

  // Storno-Daten aus stornoDetails (Single Source of Truth)
  var sd=stornoDetails.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });
  var sdMitBetrag=sd.filter(function(r){return r.betrag<0;});
  var bonIds={};sd.forEach(function(r){bonIds[r.quittungsId]=1;});
  var betroffeneBons=Object.keys(bonIds).length;
  var komplettBonIds={};
  sd.forEach(function(r){
    if(r.grund&&r.grund.indexOf("Konto storniert")!==-1) komplettBonIds[r.quittungsId]=1;
  });
  var komplettStornos=Object.keys(komplettBonIds).length;
  var teilStornos=betroffeneBons-komplettStornos;
  var artCount=sdMitBetrag.length;
  var totalWert=sdMitBetrag.reduce(function(s,r){return s+r.betrag;},0);

  // Storno nach Stunde (aus Detail-Daten — konsistent mit stornoDetails)
  var stornoStd={};
  sd.forEach(function(r){
    if(r.stunde>=0)stornoStd[r.stunde]=(stornoStd[r.stunde]||0)+1;
  });

  if(sd.length===0){
    document.getElementById("t-stornierungen").innerHTML='<div class="box" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">❌</div><div style="color:#475569">Keine Stornierungen im Zeitraum.</div></div>';
    return;
  }

  var html=`
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Betroffene Bons</div>
        <div class="kpi-val" style="color:#ef4444">${betroffeneBons}</div>
        <div class="kpi-delta delta-dn">${komplettStornos} komplett · ${teilStornos} teilweise</div>
        <div class="kpi-ai">${bonsG.length} Bons gesamt</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Stornierte Artikel</div>
        <div class="kpi-val" style="color:#FF8000">${artCount}</div>
        <div class="kpi-delta delta-neu">Ø ${betroffeneBons>0?(artCount/betroffeneBons).toFixed(1):"0"} pro Bon</div>
        <div class="kpi-ai">Positionen mit negativem Betrag</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Stornowert</div>
        <div class="kpi-val" style="color:#E84393">${fmt(totalWert)}</div>
        <div class="kpi-delta delta-dn">Entgangener Umsatz</div>
        <div class="kpi-ai">Ø ${betroffeneBons>0?fmt(totalWert/betroffeneBons):'€ 0'} pro Bon</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Storno-Rate</div>
        <div class="kpi-val" style="color:${bonsG.length>0&&betroffeneBons/bonsG.length>0.01?'#ef4444':'#22c55e'}">${bonsG.length>0?(betroffeneBons/bonsG.length*100).toFixed(1):'0'}%</div>
        <div class="kpi-delta ${bonsG.length>0&&betroffeneBons/bonsG.length>0.01?'delta-dn':'delta-up'}">${betroffeneBons} von ${bonsG.length} Bons</div>
        <div class="kpi-ai">Anteil betroffener Bons</div>
      </div>
    </div>

    <div class="grid2" style="align-items:start">
      <div class="box">
        <div class="box-title">⏰ Stornierungen nach Uhrzeit</div>
        <div class="box-sub">Wann passieren die meisten Stornos?</div>
        ${Object.keys(stornoStd).length>0?
          '<canvas id="c-storno-std" style="max-height:180px"></canvas>':
          '<div style="color:#475569;font-size:12px;padding:12px">Keine Stornierungen im Zeitraum ✓</div>'}
      </div>
      <div class="box">
        <div class="box-title">📍 Stornierungen pro Standort</div>
        <div class="box-sub">Anzahl stornierter Artikel nach Laden</div>
        <canvas id="c-storno-standort" style="max-height:180px"></canvas>
      </div>
    </div>

    ${renderStornoAnalyse(von,bis,st)}

    <div class="box" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="box-title">🤖 KI-Analyse: Stornierungen</div><div class="box-sub">Automatische Bewertung der Storno-Muster</div></div>
        <button id="btn-report-stornierungen" onclick="generateTabReport('stornierungen')" style="background:#E84393;border:none;border-radius:6px;padding:6px 14px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">🤖 Bericht generieren</button>
      </div>
      <div id="tab-report-stornierungen" style="display:none;margin-top:12px;border-top:1px solid #0a3545;padding-top:12px"></div>
    </div>`;

  document.getElementById("t-stornierungen").innerHTML=html;

  // Charts
  // Storno nach Uhrzeit (Liniendiagramm)
  dc("c-storno-std");
  var stornoStdKeys=Object.keys(stornoStd).sort(function(a,b){return parseInt(a)-parseInt(b);});
  if(stornoStdKeys.length>0){
    var cEl=document.getElementById("c-storno-std");
    if(cEl)charts["c-storno-std"]=new Chart(cEl,{
      type:"line",
      data:{labels:stornoStdKeys.map(function(h){return h+":00";}),datasets:[{label:"Stornos",data:stornoStdKeys.map(function(h){return stornoStd[h];}),borderColor:"#ef4444",backgroundColor:"#ef444420",fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:"#ef4444",borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#475569",font:{size:10}},grid:{color:"#1e2d40"}},y:{ticks:{color:"#475569",font:{size:10},stepSize:1},grid:{color:"#1e2d4030"}}}}
    });
  }

  // Storno pro Standort (Balkendiagramm — Artikel-Anzahl aus stornoDetails)
  dc("c-storno-standort");
  var stornoArtMd=sd.filter(function(r){return r.standort==="Mehringdamm"&&r.betrag<0;}).length;
  var stornoArtRs=sd.filter(function(r){return r.standort==="Rosenthaler Straße"&&r.betrag<0;}).length;
  var cStandort=document.getElementById("c-storno-standort");
  if(cStandort)charts["c-storno-standort"]=new Chart(cStandort,{
    type:"bar",
    data:{
      labels:["Mehringdamm","Rosenthaler Str."],
      datasets:[{
        label:"Stornierte Artikel",
        data:[stornoArtMd,stornoArtRs],
        backgroundColor:["#ef4444","#FF8000"],
        borderRadius:6,
        barPercentage:0.5
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"#cbd5e1",font:{size:11,weight:"600"}},grid:{display:false}},
        y:{ticks:{color:"#475569",font:{size:10},stepSize:1},grid:{color:"#1e2d4030"}}
      }
    }
  });

  // Storno-Detail Charts (aus 15_ls_stornos)
  var sdChart=stornoDetails.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });
  if(sdChart.length>0){
    // Donut: Stornodefinition
    var defMapC={};
    sdChart.forEach(function(r){
      var d=r.stornodefinition||"Unbekannt";
      defMapC[d]=(defMapC[d]||0)+1;
    });
    var defLabels=Object.keys(defMapC).sort(function(a,b){return defMapC[b]-defMapC[a];});
    var defVals=defLabels.map(function(k){return defMapC[k];});
    var defColMap={"Fehleintrag":"#FF8000","Bruch":"#ef4444","Unzufriedener Gast":"#E84393","Andere":"#64748b"};
    var defCols=defLabels.map(function(k){return defColMap[k]||"#94a3b8";});

    dc("c-storno-def");
    var cDef=document.getElementById("c-storno-def");
    if(cDef)charts["c-storno-def"]=new Chart(cDef,{
      type:"doughnut",
      data:{labels:defLabels,datasets:[{data:defVals,backgroundColor:defCols,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"55%",
        plugins:{legend:{position:"bottom",labels:{color:"#cbd5e1",font:{size:11},padding:10,usePointStyle:true,pointStyle:"circle",boxWidth:10}}}}
    });

    // Trend: Stornos pro Woche
    var wMap={};
    sdChart.forEach(function(r){
      var d=new Date(r.datum+"T12:00:00");
      var wStart=new Date(d);wStart.setDate(d.getDate()-d.getDay()+1);
      var wKey=wStart.toISOString().split("T")[0];
      if(!wMap[wKey])wMap[wKey]={count:0,betrag:0};
      wMap[wKey].count++;
      if(r.betrag<0)wMap[wKey].betrag+=r.betrag;
    });
    var wKeys=Object.keys(wMap).sort();
    if(wKeys.length>1){
      dc("c-storno-trend");
      var cTrend=document.getElementById("c-storno-trend");
      if(cTrend)charts["c-storno-trend"]=new Chart(cTrend,{
        type:"bar",
        data:{labels:wKeys.map(function(k){var p=k.split("-");return p[2]+"."+p[1];}),
          datasets:[
            {label:"Anzahl",data:wKeys.map(function(k){return wMap[k].count;}),backgroundColor:"#ef4444",borderRadius:3,yAxisID:"y"},
            {label:"Wert (€)",data:wKeys.map(function(k){return Math.abs(wMap[k].betrag);}),type:"line",borderColor:"#FF8000",backgroundColor:"rgba(255,128,0,0.1)",pointRadius:2,borderWidth:2,fill:true,yAxisID:"y1"}
          ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{labels:{color:"#cbd5e1",font:{size:10}}}},
          scales:{
            x:{ticks:{color:"#475569",font:{size:10}},grid:{color:"#1e2d40"}},
            y:{position:"left",ticks:{color:"#ef4444",font:{size:10}},grid:{color:"#1e2d40"}},
            y1:{position:"right",ticks:{color:"#FF8000",font:{size:10},callback:function(v){return v+"€";}},grid:{display:false}}
          }}
      });
    }
  }
}

// ============================================================
// RABATTE
// ============================================================
function renderRabatte(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;

  // Alle Artikel im Zeitraum (inkl. stornierte, um Rabatte vollständig zu sehen)
  var allArt=artikel.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });
  // Alle Bons im Zeitraum
  var allBons=(hatStundenfilter()?getBonsGefiltert(von,bis,st):bons.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  }));

  // Rabattierte Artikel: rabatt != 0 ODER gratis != 0
  var rabArt=allArt.filter(function(r){return r.rabatt!==0||r.gratis!==0;});
  // Rabattierte Bons
  var rabBons=allBons.filter(function(r){return r.rabatt!==0;});

  if(rabArt.length===0&&rabBons.length===0){
    document.getElementById("t-rabatte").innerHTML='<div class="box" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">🏷️</div><div style="color:#475569">Keine Rabatt-Daten für diesen Zeitraum.</div></div>';
    return;
  }

  var totalRabatt=rabArt.reduce(function(s,r){return s+Math.abs(r.rabatt)+Math.abs(r.gratis);},0);
  var totalRabattBons=rabBons.length;
  var totalRabattArt=rabArt.length;
  var avgPerBon=totalRabattBons>0?totalRabatt/totalRabattBons:0;

  // Unique Bon-IDs mit Rabatt
  var rabBonIds={};rabArt.forEach(function(r){rabBonIds[r.bonNr]=1;});
  var uniqueRabBons=Object.keys(rabBonIds).length;

  // === TISCH-KATEGORIEN ===
  // Hilfsfunktion: Tisch-Typ erkennen
  function tischTyp(t){
    t=(t||"").toLowerCase();
    if(t.indexOf("mitarbeiter")!==-1) return "ma";
    if(t.indexOf("takeaway")!==-1||t.indexOf("order ")===0) return "online";
    if(t.indexOf("inside")!==-1||t.indexOf("outside")!==-1) return "tisch";
    if(t.match(/^\d+$/)) return "tisch";
    if(t==="") return "leer";
    return "andere";
  }
  // Mitarbeiter-Tische: ALLE Einträge (pos. + neg.) zum Netting
  var maTischRaw=allArt.filter(function(r){ return tischTyp(r.tisch)==="ma"; });
  // Nur rabattierte Artikel auf normalen Tischen (nicht MA, nicht Online)
  var normalTischRab=rabArt.filter(function(r){ var typ=tischTyp(r.tisch); return typ==="tisch"||typ==="andere"; });

  // === FIFO STORNO-MATCHING mit versteckter Rabatt-Erkennung ===
  // Lightspeed-Stornos (menge=-1) kommen bei echten Stornos UND bei Umbuchungen/Neudrucken.
  // FIFO: Positive Einträge chronologisch aufbauen, negative verrechnen den ältesten positiven.
  // Versteckte Rabatte: Wenn ein verwaister Storno (€-7) von einer Neubuchung (€0) gefolgt wird,
  // ist die Differenz ein impliziter Rabatt der das normale Rabatt-System umgeht.
  var fifoMap={};// key: tisch|datum|artikelname → [entries]
  maTischRaw.forEach(function(r){
    var key=r.tisch+"|"+r.datum+"|"+r.name;
    if(!fifoMap[key]) fifoMap[key]=[];
    fifoMap[key].push(r);
  });
  var maTischArt=[];
  Object.keys(fifoMap).forEach(function(key){
    // Sortiere nach BonNr (chronologisch)
    var entries=fifoMap[key].sort(function(a,b){return (a.bonNr||"").localeCompare(b.bonNr||"");});
    var pending=[];// Queue: positive Einträge die noch nicht storniert wurden
    var orphanStornoPrices=[];// Preise verwaister Stornos (kein passendes +1 vorher)
    entries.forEach(function(r){
      if(r.menge>0){
        // Prüfe ob ein verwaister Storno davor lag → Preisdifferenz prüfen
        if(orphanStornoPrices.length>0){
          var stornoPreis=orphanStornoPrices.shift();
          // Originalpreis der Neubuchung = Bezahlt + expliziter Rabatt/Gratis
          var neubuchungOriginal=r.preis+Math.abs(r.rabatt)+Math.abs(r.gratis);
          // Nur wenn Storno-Preis HÖHER als Neubuchungs-Originalpreis → echte Preisdifferenz
          // (Wenn gleich: Storno war nur Umbuchung für Rabatt-Anwendung, kein versteckter Rabatt)
          if(stornoPreis>neubuchungOriginal+0.01){
            r._implicitRabatt=stornoPreis-neubuchungOriginal;
            r._originalPreis=stornoPreis;
          } else if(stornoPreis>r.preis+0.01&&!r._originalPreis){
            // Storno-Preis höher als bezahlt, aber expliziter Rabatt erklärt Differenz
            // → Originalpreis aus Storno übernehmen (genauer als preis+rabatt bei Rundung)
            r._originalPreis=stornoPreis;
          }
        }
        pending.push(r);
      } else if(r.menge<0){
        // FIFO: ältesten positiven Eintrag verrechnen
        if(pending.length>0){
          pending.shift();
        } else {
          // Verwaister Storno → Preis merken für versteckte Rabatt-Erkennung
          orphanStornoPrices.push(Math.abs(r.preis));
        }
      }
    });
    // Übrige positive Einträge = tatsächlich konsumiert
    pending.forEach(function(r){ maTischArt.push(r); });
  });

  // rabArt nach FIFO neu berechnen — jetzt inkl. versteckter Storno-Rabatte (_implicitRabatt)
  rabArt=allArt.filter(function(r){return r.rabatt!==0||r.gratis!==0||(r._implicitRabatt||0)>0;});
  // KPIs neu berechnen mit vollständigen Rabatt-Daten
  totalRabatt=rabArt.reduce(function(s,r){return s+Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);},0);
  totalRabattArt=rabArt.length;
  avgPerBon=totalRabattBons>0?totalRabatt/totalRabattBons:0;
  rabBonIds={};rabArt.forEach(function(r){rabBonIds[r.bonNr]=1;});
  uniqueRabBons=Object.keys(rabBonIds).length;

  // === MITARBEITER-ESSEN pro Tag (basierend auf positiven Einträgen) ===
  // Erlaubt: 1x Bang Bang Minced Beef ODER Minced Soja pro Tag + Getränke 70% off
  // Positive Einträge = bestellt & konsumiert (Storno-Zeilen menge<0 ausgeblendet)
  var maEssenMap={};// {tisch: {datum: {hauptspeisen:[], getraenke:[], andere:[]}}}
  maTischArt.forEach(function(r){
    var tisch=r.tisch||"Unbekannt";
    var tag=r.datum;
    if(!maEssenMap[tisch])maEssenMap[tisch]={};
    if(!maEssenMap[tisch][tag])maEssenMap[tisch][tag]={hauptspeisen:[],getraenke:[],andere:[],total:0,rabattTotal:0};
    var n=(r.name||"").toLowerCase();
    var isHaupt=n.indexOf("minced beef")!==-1||n.indexOf("minced soja")!==-1||n.indexOf("biang biang")!==-1||n.indexOf("bang bang minced")!==-1;
    var isGetraenk=(r.gruppe||"").toLowerCase().indexOf("getränk")!==-1||(r.gruppe||"").toLowerCase().indexOf("drink")!==-1||(r.gruppe||"").toLowerCase().indexOf("softdrink")!==-1||n.indexOf("cola")!==-1||n.indexOf("kola")!==-1||n.indexOf("wasser")!==-1||n.indexOf("limo")!==-1||n.indexOf("bier")!==-1||n.indexOf("mate")!==-1||n.indexOf("saft")!==-1||n.indexOf("tee ")!==-1||n.indexOf("kaffee")!==-1||n.indexOf("espresso")!==-1||n.indexOf("fritz")!==-1||n.indexOf("schorle")!==-1||n.indexOf("spritz")!==-1||n.indexOf("spezi")!==-1||n.indexOf("bionade")!==-1||n.indexOf("viva con")!==-1||/\d+[,.]?\d*\s*l\b/.test(n);
    if(isHaupt) maEssenMap[tisch][tag].hauptspeisen.push(r);
    else if(isGetraenk) maEssenMap[tisch][tag].getraenke.push(r);
    else maEssenMap[tisch][tag].andere.push(r);
    maEssenMap[tisch][tag].total+=r.preis;
    maEssenMap[tisch][tag].rabattTotal+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
  });

  // Compliance-Auswertung
  // Regeln: Nur RABATTIERTE Hauptspeisen sind auf 1×/Tag limitiert (inkl. versteckte Storno-Rabatte).
  // Vollpreis-Bestellungen sind KEIN Verstoß.
  // Getränke sind KEIN Verstoß (egal wie viele).
  // "Andere" Artikel mit Rabatt = Verstoß.
  var violations=[];
  var complianceStats={ok:0,warn:0};
  Object.keys(maEssenMap).forEach(function(tisch){
    Object.keys(maEssenMap[tisch]).forEach(function(tag){
      var d=maEssenMap[tisch][tag];
      // Nur rabattierte Hauptspeisen zählen fürs Limit (explizite + implizite Storno-Rabatte)
      var hauptRabattiert=d.hauptspeisen.filter(function(r){return Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0)>0;});
      var hauptRabMenge=hauptRabattiert.reduce(function(s,r){return s+r.menge;},0);
      if(hauptRabMenge>1){
        violations.push({tisch:tisch,datum:tag,typ:"Hauptspeise",detail:hauptRabMenge+"× rabattierte Hauptspeise statt max 1×",artikel:hauptRabattiert.map(function(r){return r.name;}).join(", ")});
        complianceStats.warn++;
      } else { complianceStats.ok++; }
      // "Andere" Artikel MIT Rabatt = nicht erlaubt (inkl. versteckte Storno-Rabatte)
      var andereRabattiert=d.andere.filter(function(r){return Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0)>0;});
      if(andereRabattiert.length>0){
        violations.push({tisch:tisch,datum:tag,typ:"Nicht erlaubt",detail:andereRabattiert.length+"× nicht erlaubte Artikel rabattiert",artikel:andereRabattiert.map(function(r){return r.name;}).join(", ")});
      }
    });
  });
  violations.sort(function(a,b){return b.datum>a.datum?1:b.datum<a.datum?-1:0;});

  // === RABATTE NACH MITARBEITER (wer hat den Rabatt gegeben) ===
  var maRabMap={};
  rabArt.forEach(function(r){
    var ma=r.mitarbeiter||"Unbekannt";
    if(!maRabMap[ma])maRabMap[ma]={count:0,betrag:0,bons:{},artikel:[]};
    maRabMap[ma].count++;
    maRabMap[ma].betrag+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
    maRabMap[ma].bons[r.bonNr]=1;
    maRabMap[ma].artikel.push(r);
  });
  var maRabList=Object.entries(maRabMap).sort(function(a,b){return b[1].betrag-a[1].betrag;});

  // === TOP RABATTIERTE ARTIKEL ===
  var artRabMap={};
  rabArt.forEach(function(r){
    var n=r.name||"Unbekannt";
    if(!artRabMap[n])artRabMap[n]={count:0,betrag:0,menge:0,artikel:[]};
    artRabMap[n].count++;
    artRabMap[n].betrag+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
    artRabMap[n].menge+=r.menge;
    artRabMap[n].artikel.push(r);
  });
  var artRabList=Object.entries(artRabMap).sort(function(a,b){return b[1].betrag-a[1].betrag;}).slice(0,10);
  var maxArtRab=artRabList.length>0?artRabList[0][1].betrag:1;

  // === NACH TISCH (ohne Online-Orders) ===
  var tischMap={};
  rabArt.forEach(function(r){
    var t=r.tisch||"Kein Tisch";
    var typ=tischTyp(t);
    if(typ==="online") return; // Takeaway/Order rausfiltern
    if(!tischMap[t])tischMap[t]={count:0,betrag:0,bons:{},typ:typ};
    tischMap[t].count++;
    tischMap[t].betrag+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
    tischMap[t].bons[r.bonNr]=1;
  });
  var tischList=Object.entries(tischMap).sort(function(a,b){return b[1].betrag-a[1].betrag;}).slice(0,15);
  // Kürze Tischnamen für Anzeige
  function kurzTisch(name){
    return name.replace("Inside 2026, ","⬛ ").replace("Outside 2026, ","🟫 ").replace("Mitarbeiter, ","🍜 MA ");
  }

  // === PER STANDORT ===
  var mdRab=rabArt.filter(function(r){return r.standort==="Mehringdamm";});
  var rsRab=rabArt.filter(function(r){return r.standort==="Rosenthaler Straße";});
  var mdBetrag=mdRab.reduce(function(s,r){return s+Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);},0);
  var rsBetrag=rsRab.reduce(function(s,r){return s+Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);},0);
  var mdBonIds={};mdRab.forEach(function(r){mdBonIds[r.bonNr]=1;});
  var rsBonIds={};rsRab.forEach(function(r){rsBonIds[r.bonNr]=1;});

  // === NACH STUNDE ===
  var stdMap={};
  rabArt.forEach(function(r){
    if(r.stunde>=0){
      if(!stdMap[r.stunde])stdMap[r.stunde]={count:0,betrag:0};
      stdMap[r.stunde].count++;
      stdMap[r.stunde].betrag+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
    }
  });

  // === WOCHEN-TREND ===
  var wMap={};
  rabArt.forEach(function(r){
    var d=new Date(r.datum);
    var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);
    var mon=new Date(d.setDate(diff));
    var wk=mon.toISOString().slice(0,10);
    if(!wMap[wk])wMap[wk]={count:0,betrag:0};
    wMap[wk].count++;
    wMap[wk].betrag+=Math.abs(r.rabatt)+Math.abs(r.gratis)+(r._implicitRabatt||0);
  });
  var wKeys=Object.keys(wMap).sort();

  // === MA-Tisch Zusammenfassung ===
  var maTischSummary=[];
  Object.keys(maEssenMap).forEach(function(tisch){
    var tage=Object.keys(maEssenMap[tisch]);
    var totalRab=0;var totalItems=0;var hauptCount=0;var getCount=0;var andereCount=0;
    tage.forEach(function(tag){
      var d=maEssenMap[tisch][tag];
      totalRab+=d.rabattTotal;
      totalItems+=d.hauptspeisen.length+d.getraenke.length+d.andere.length;
      hauptCount+=d.hauptspeisen.length;
      getCount+=d.getraenke.length;
      andereCount+=d.andere.length;
    });
    maTischSummary.push({tisch:tisch,tage:tage.length,totalRab:totalRab,totalItems:totalItems,haupt:hauptCount,getraenke:getCount,andere:andereCount});
  });
  maTischSummary.sort(function(a,b){return b.totalRab-a.totalRab;});

  // === HTML RENDERING ===
  var html='';

  // KPI Row
  html+='<div style="display:flex;gap:12px;margin-bottom:14px">'+
    '<div style="flex:1;background:#111827;border-radius:10px;padding:14px;border:1px solid #1e2d40;border-left:3px solid #E84393">'+
      '<div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:0.5px">Rabatt-Gesamtwert</div>'+
      '<div style="font-size:24px;font-weight:700;color:#E84393;margin:4px 0">'+fmt(totalRabatt)+'</div>'+
      '<div style="font-size:11px;color:#94a3b8">Ø '+fmt(avgPerBon)+' pro Bon</div>'+
    '</div>'+
    '<div style="flex:1;background:#111827;border-radius:10px;padding:14px;border:1px solid #1e2d40;border-left:3px solid #FF8000">'+
      '<div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:0.5px">Rabattierte Bons</div>'+
      '<div style="font-size:24px;font-weight:700;color:#FF8000;margin:4px 0">'+uniqueRabBons+'</div>'+
      '<div style="font-size:11px;color:#94a3b8">von '+allBons.length+' gesamt ('+(allBons.length>0?(uniqueRabBons/allBons.length*100).toFixed(1):0)+'%)</div>'+
    '</div>'+
    '<div style="flex:1;background:#111827;border-radius:10px;padding:14px;border:1px solid #1e2d40;border-left:3px solid #40F0FF">'+
      '<div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:0.5px">Rabattierte Artikel</div>'+
      '<div style="font-size:24px;font-weight:700;color:#40F0FF;margin:4px 0">'+totalRabattArt+'</div>'+
      '<div style="font-size:11px;color:#94a3b8">Ø '+(uniqueRabBons>0?(totalRabattArt/uniqueRabBons).toFixed(1):0)+' Artikel pro Bon</div>'+
    '</div>'+
    '<div style="flex:1;background:#111827;border-radius:10px;padding:14px;border:1px solid #1e2d40;border-left:3px solid #22c55e">'+
      '<div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:0.5px">MA-Tische</div>'+
      '<div style="font-size:24px;font-weight:700;color:#22c55e;margin:4px 0">'+maTischSummary.length+'</div>'+
      '<div style="font-size:11px;color:#94a3b8">'+maTischArt.length+' Positionen</div>'+
    '</div>'+
  '</div>';

  // === MITARBEITER-ESSEN MONITOR (volle Breite) ===
  html+='<div class="box">'+
    '<div class="box-title">🍜 Mitarbeiter-Essen Monitor</div>'+

        '<td style="padding:4px;color:#94a3b8;white-space:nowrap">'+fmtWdayR(r.datum)+' '+fmtDatR(r.datum)+'</td>'+
        '<td style="padding:4px;text-align:right;color:#64748b">'+fmtD(orig)+'</td>'+

  html+='</div>';

  // Rabatte auf normalen Tischen (nicht MA, nicht Online) — Warnung wenn vorhanden

function renderSimulator(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;
  var k=kpi(gefiltert);
  var pk=hatStundenfilter()?getOrdioStunden(von,bis,st):getOrdio(von,bis,st);
  if(hatStundenfilter()){var uStdSim=getUmsatzGefiltert(von,bis,st);var avgFcQSim=getAvgFcQuote(st);k={u:uStdSim.u,f:uStdSim.u*avgFcQSim,s:k.s,t:k.t,fp:avgFcQSim,at:k.at};}
  var paBase=pk.total>0?pk.total:k.u*0.33;
  var paReal=pk.total>0;
  var paBasePct=k.u>0?paBase/k.u*100:33;
  // FC: Ist wenn Bestandsbericht vorhanden, sonst Soll — gleiche Logik wie Übersicht
  var rfcSim=getRealFC(st);
  var hatIstSim=istInBestandZeitraum(von,bis,rfcSim);
  var fb=hatIstSim?(rfcSim.quote*100):(k.fp*100);
  var fcLabel=hatIstSim?'Ist':'Soll';
  var fkSim=getFixkostenTage(von,bis);
  // Prorate Fixkosten auf Datentage — gleiche Logik wie Übersicht
  var dataTageS=k.t;
  var kalTageS=Math.round((new Date(bis+"T12:00:00")-new Date(von+"T12:00:00"))/86400000)+1;
  if(dataTageS<kalTageS){
    var fkFaktorS=dataTageS/kalTageS;
    Object.keys(fkSim).forEach(function(key){if(key!=="tage")fkSim[key]=fkSim[key]*fkFaktorS;});
    fkSim.tage=dataTageS;
  }

  // Basis LDO Provision — nur Tage mit Umsatzdaten (wie Übersicht)
  var uDatumSetSim={}; gefiltert.forEach(function(r){uDatumSetSim[r.datum]=1;});
  var txSim=lsTx.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  var txSimAligned=txSim.filter(function(r){return uDatumSetSim[r.datum];});
  var ldoBaseProv=txSimAligned.reduce(function(s,r){return s+r.ldo;},0)*0.20;

  // IST-Werte (Vorher)
  var uA=k.u;
  var fcA=hatIstSim?rfcSim.quote*k.u:k.f;
  var ldoProvA=ldoBaseProv;
  var rohertraA=uA-fcA-ldoProvA;
  var paOpaA=paBase;
  var cmA=rohertraA-paOpaA;
  var smKostenSim=getSocialMediaKosten(von,bis,st);
  var paGemA=fkSim.personalGemein+fkSim.managementFee+smKostenSim;
  var mieteA=fkSim.miete+fkSim.versicherung;
  var werbeA=fkSim.werbeReise;
  var sonstA=fkSim.sonstBetrieb+fkSim.verwaltung+fkSim.instandhaltung+fkSim.abschreibung;
  var ebitdaA=cmA-paGemA-mieteA-werbeA-sonstA;

  // SIMULIERT (Nachher)
  var uN=uA*(1+simV.p/100)*(1+simV.v/100);
  var fcN=uN*((fb+simV.f)/100);
  var ldoProvN=ldoBaseProv*(uN/Math.max(uA,1)); // LDO skaliert mit Umsatz
  var rohertraN=uN-fcN-ldoProvN;
  var paN=paReal?paBase*(1+simV.a/100):uN*((paBasePct+simV.a)/100);
  var cmN=rohertraN-paN;
  // Fixkosten bleiben gleich
  var ebitdaN=cmN-paGemA-mieteA-werbeA-sonstA;
  var diff=ebitdaN-ebitdaA;

  function simRow(label,a,n,neg,bold,sep){
    var better=neg?n<a:n>a;
    var col=Math.abs(n-a)<0.5?"#64748b":better?"#22c55e":"#ef4444";
    var style=bold?"font-weight:700;color:#f1f5f9;font-size:13px":"color:#64748b";
    var borderTop=sep?"border-top:2px solid #E84393;margin-top:4px;padding-top:10px":"border-bottom:1px solid #1e2d40";
    return'<div style="display:flex;justify-content:space-between;padding:7px 0;'+borderTop+';font-size:12px">'+
      '<span style="'+style+';flex:1">'+label+'</span>'+
      '<span style="color:#475569;width:80px;text-align:right">'+fmt(a)+'</span>'+
      '<span style="color:'+col+';width:90px;text-align:right;font-weight:'+(bold?700:600)+'">'+fmt(n)+'</span>'+
    '</div>';
  }

  document.getElementById("t-simulator").innerHTML=`
    <div class="grid2">
      <div class="box">
        <div class="box-title" style="color:#E84393">🧮 GuV-Simulator</div>
        <div style="font-size:11px;color:#475569;margin-bottom:6px">Basis: echte Daten aus Apicbase + Ordio</div>
        <div style="font-size:11px;margin-bottom:16px">${paReal?'<span class="badge bb">Personal: Ordio Live ('+fmt(paBase)+')</span>':'<span class="badge by">Personal: Schätzung 33%</span>'}</div>
        ${[
          {id:"p",label:"Preisänderung",val:simV.p,min:-20,max:30,col:"#E84393"},
          {id:"v",label:"Verkaufsmenge",val:simV.v,min:-30,max:30,col:"#00EEFC"},
          {id:"f",label:"Food Cost (Punkte)",val:simV.f,min:-5,max:10,col:"#E84393"},
          {id:"a",label:paReal?"Personal (%±)":"Personal (Punkte)",val:simV.a,min:-15,max:25,col:"#22c55e"}
        ].map(function(s){
          return'<div class="slider-row">'+
            '<div class="slider-top"><span>'+s.label+'</span><span style="color:'+(s.val>0?'#22c55e':s.val<0?'#ef4444':'#64748b')+';font-weight:700">'+(s.val>0?"+":"")+s.val+'%</span></div>'+
            '<input type="range" min="'+s.min+'" max="'+s.max+'" step="1" value="'+s.val+'" style="accent-color:'+s.col+'" oninput="simV.'+s.id+'=Number(this.value);renderSimulator()">'+
          '</div>';
        }).join("")}
        <button onclick="simV={p:0,v:0,f:0,a:0};renderSimulator()" style="width:100%;background:#1a2538;border:1px solid #2d3f54;color:#64748b;padding:8px;border-radius:8px;cursor:pointer;font-size:13px">🔄 Zurücksetzen</button>
      </div>

      <div class="box">
        <div class="box-title">📄 Vorher vs. Nachher</div>
        <div style="display:flex;justify-content:space-between;padding:4px 0 8px;border-bottom:1px solid #0a3545;font-size:10px;color:#475569;margin-bottom:4px">
          <span style="flex:1"></span>
          <span style="width:80px;text-align:right">IST</span>
          <span style="width:90px;text-align:right">SIMULIERT</span>
        </div>
        ${simRow("Umsatz",uA,uN,false,false,false)}
        ${simRow("− Food Cost ("+fcLabel+" "+(fb+simV.f).toFixed(1)+"%)",fcA,fcN,true,false,false)}
        ${simRow("− Lieferando-Provision (20%)",ldoProvA,ldoProvN,true,false,false)}
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e2d40;font-size:12px;font-weight:600">
          <span style="color:#94a3b8;flex:1">= Rohertrag</span>
          <span style="color:#475569;width:80px;text-align:right">${fmt(rohertraA)}</span>
          <span style="color:${rohertraN>=rohertraA?'#22c55e':'#ef4444'};width:90px;text-align:right">${fmt(rohertraN)}</span>
        </div>
        ${simRow("− Operative Personal "+(paReal?"(Ordio)":"(~33%)"),paOpaA,paN,true,false,false)}
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:2px solid #00EEFC40;font-size:12px;font-weight:700">
          <span style="color:#00EEFC;flex:1">= Contribution Margin</span>
          <span style="color:#475569;width:80px;text-align:right">${fmt(cmA)}</span>
          <span style="color:${cmN>=cmA?'#22c55e':'#ef4444'};width:90px;text-align:right">${fmt(cmN)}</span>
        </div>
        ${simRow("− Personalgemeinkosten (fix)",paGemA,paGemA,true,false,false)}
        ${simRow("− Miete & Leasing (fix)",mieteA,mieteA,true,false,false)}
        ${simRow("− Werbe- & Reisekosten (fix)",werbeA,werbeA,true,false,false)}
        ${simRow("− Sonstige Fixkosten (fix)",sonstA,sonstA,true,false,false)}
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid #E84393;margin-top:4px">
          <span style="font-weight:700;color:#f1f5f9;font-size:13px">= EBITDA</span>
          <span style="color:#475569;font-size:12px;font-weight:600">${fmt(ebitdaA)}</span>
          <span style="color:${ebitdaN>=ebitdaA?'#22c55e':'#ef4444'};font-size:15px;font-weight:700">${fmt(ebitdaN)}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <div style="flex:1;background:#1a2538;border-radius:6px;padding:6px 10px;text-align:center;font-size:11px">
            <div style="color:#475569">IST EBITDA-Marge</div>
            <div style="color:${ebitdaA/Math.max(uA,1)>=ZIELE.ebitda?'#22c55e':'#ef4444'};font-weight:700">${fmtP(uA>0?ebitdaA/uA:0)}</div>
          </div>
          <div style="flex:1;background:#1a2538;border-radius:6px;padding:6px 10px;text-align:center;font-size:11px">
            <div style="color:#475569">SIM EBITDA-Marge</div>
            <div style="color:${ebitdaN/Math.max(uN,1)>=ZIELE.ebitda?'#22c55e':'#ef4444'};font-weight:700">${fmtP(uN>0?ebitdaN/uN:0)}</div>
          </div>
        </div>
        <div style="padding:10px 12px;background:${diff>=0?'#16653420':'#7f1d1d20'};border:1px solid ${diff>=0?'#16653440':'#7f1d1d40'};border-radius:8px;margin-top:8px">
          <div style="font-size:13px;font-weight:700;color:${diff>=0?'#22c55e':'#ef4444'}">${diff>=0?"▲":"▼"} ${diff>=0?"+":""}${fmt(diff)} (${ebitdaA!==0?((diff/Math.abs(ebitdaA))*100).toFixed(1):0}%)</div>
          <div style="font-size:11px;color:#64748b;margin-top:3px">${diff>5000?"🟢 Starker positiver Effekt":diff>0?"🟡 Leichte Verbesserung":"🔴 EBITDA sinkt — Annahmen prüfen"}</div>
        </div>
        <div class="ai-box" style="margin-top:8px">
          ${simV.p!==0||simV.v!==0||simV.f!==0||simV.a!==0?
            "Simulierter EBITDA: "+fmt(ebitdaN)+" ("+fmtP(uN>0?ebitdaN/uN:0)+"). "+
            (simV.p>0?"Preiserhöhung +"+simV.p+"% = stärkster Hebel: mehr Umsatz ohne Mehrkosten. ":"")+
            (simV.f<0?"FC-Senkung um "+Math.abs(simV.f)+"Punkte spart "+fmt(fcA-fcN)+". ":"")+
            (simV.a<0?"Personalreduktion "+Math.abs(simV.a)+"% spart "+fmt(paOpaA-paN)+". ":""):
            "Schieberegler bewegen um Szenarien zu simulieren. Fixkosten (Gemeinkosten, Miete) bleiben konstant."}
        </div>
      </div>
    </div>

    <div class="box" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="box-title">🤖 KI-Analyse: Simulator</div><div class="box-sub">KI-gestützte Szenario-Bewertung</div></div>
        <button id="btn-report-simulator" onclick="generateTabReport('simulator')" style="background:#E84393;border:none;border-radius:6px;padding:6px 14px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">🤖 Bericht generieren</button>
      </div>
      <div id="tab-report-simulator" style="display:none;margin-top:12px;border-top:1px solid #0a3545;padding-top:12px"></div>
    </div>`;
}

function renderLieferando(){
  var von=document.getElementById("von").value;
  var bis=document.getElementById("bis").value;
  var st=document.getElementById("standort").value;
  var tage=new Set(gefiltert.map(function(r){return r.datum;})).size||1;

  // === UMSATZ ===
  var txLdo=lsTx.filter(function(r){
    return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);
  });
  var ldoBrutto=txLdo.reduce(function(s,r){return s+r.ldo;},0);
  var ldoProv=ldoBrutto*0.20;
