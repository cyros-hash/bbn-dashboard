function buildTagesberichtContext() {
  // Gestern berechnen
  var heute = new Date();
  var gesternD = new Date(heute);
  gesternD.setDate(gesternD.getDate() - 1);
  // Lokale Zeit verwenden (nicht UTC) um Zeitzonenfehler zu vermeiden
  var gestern = String(gesternD.getDate()).padStart(2,'0')+'.'+String(gesternD.getMonth()+1).padStart(2,'0')+'.'+gesternD.getFullYear();
  var gesternISO = gestern; // gleich DD.MM.YYYY

  // Vorwoche gleicher Wochentag
  var vorwocheD = new Date(gesternD);
  vorwocheD.setDate(vorwocheD.getDate() - 7);
  var vorwocheISO = vorwocheD.toISOString().slice(0,10).split('-').reverse().join('.');

  // Daten gestern
  var gAll  = alle.filter(function(r){return r.datum===gestern;});
  var gMd   = gAll.filter(function(r){return r.st==="Mehringdamm";});
  var gRs   = gAll.filter(function(r){return r.st==="Rosenthaler Straße";});
  var kG    = kpi(gAll), kGMd = kpi(gMd), kGRs = kpi(gRs);

  // Daten vorwoche gleicher Tag
  var vAll  = alle.filter(function(r){return r.datum===vorwocheISO;});
  var kV    = kpi(vAll);

  // Ø letzte 7 Tage (ohne gestern)
  var letzteWoche = alle.filter(function(r){return r.datum<gestern&&r.datum>=new Date(gesternD.getTime()-7*86400000).toISOString().slice(0,10).split('-').reverse().join('.');});
  var kW = kpi(letzteWoche);
  var tageW = new Set(letzteWoche.map(function(r){return r.datum;})).size||1;

  // Personal gestern
  var ordioG  = ordio.filter(function(r){return r.datum===gestern;});
  var paCostG = ordioG.filter(function(r){return r.bereich!=="Social Media"&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1;}).reduce(function(s,r){return s+r.kosten;},0);
  var paStdG  = ordioG.filter(function(r){return r.bereich!=="Social Media"&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1;}).reduce(function(s,r){return s+r.stunden;},0);
  var smG     = ordioG.filter(function(r){return r.bereich==="Social Media";});
  var paQuoteG = kG.u>0?paCostG/kG.u:0;

  // Ø Personalkosten-Quote letzte 7 Tage
  var ordioW = ordio.filter(function(r){return r.datum<gestern;});
  var paCostW = ordioW.filter(function(r){return r.bereich!=="Social Media"&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1;}).reduce(function(s,r){return s+r.kosten;},0);
  var paQuoteW = kW.u>0?paCostW/kW.u:0;

  // Waste gestern
  var wasteGMd = waste.filter(function(r){return r.datum===gestern&&r.standort==="Mehringdamm";});
  var wasteGRs = waste.filter(function(r){return r.datum===gestern&&r.standort==="Rosenthaler Straße";});
  var wasteGMdTotal = wasteGMd.reduce(function(s,r){return s+r.kosten;},0);
  var wasteGRsTotal = wasteGRs.reduce(function(s,r){return s+r.kosten;},0);

  // Bons gestern
  var bonsG    = bons.filter(function(r){return r.datum===gestern;});
  var bwG      = getBonWert(gestern,gestern,"Alle Standorte");
  var tkG      = bonsG.filter(function(r){return r.kanal!=="Lieferando";}).reduce(function(s,r){return s+r.trinkgeld;},0);
  var tkTotalG = bonsG.filter(function(r){return r.kanal!=="Lieferando";}).reduce(function(s,r){return s+r.total;},0);
  var tkQuoteG = tkTotalG>0?tkG/tkTotalG:0;
  var stornosG = bonsG.filter(function(r){return r.storniert===1;}).length;

  // Stornos Ø letzte 7 Tage
  var bonsW    = bons.filter(function(r){return r.datum<gestern;});
  var stornosW = bonsW.filter(function(r){return r.storniert===1;}).length / tageW;

  // Lieferando gestern
  var txG     = lsTx.filter(function(r){return r.datum===gestern;});
  var ldoBruttoG = txG.reduce(function(s,r){return s+r.ldo;},0);
  var ldoAnteilG = kG.u>0?ldoBruttoG/kG.u:0;

  // Top Artikel gestern
  var artG    = artikel.filter(function(r){return r.datum===gestern&&r.storniert===0;});
  var artMapG = {};
  artG.forEach(function(r){
    if(!artMapG[r.name])artMapG[r.name]={menge:0,umsatz:0};
    artMapG[r.name].menge+=r.menge;
    artMapG[r.name].umsatz+=r.preisN;
  });
  var topArtG = Object.entries(artMapG).sort(function(a,b){return b[1].menge-a[1].menge;}).slice(0,5);

  // Bester TK-Mitarbeiter gestern
  var maMapTK = {};
  bonsG.filter(function(r){return r.kanal!=="Lieferando"&&r.mitarbeiter.indexOf(",")===-1&&r.mitarbeiter.indexOf("Online")===-1;}).forEach(function(r){
    if(!maMapTK[r.mitarbeiter])maMapTK[r.mitarbeiter]={tk:0,total:0};
    maMapTK[r.mitarbeiter].tk+=r.trinkgeld;
    maMapTK[r.mitarbeiter].total+=r.total;
  });
  var bestTK = Object.entries(maMapTK).sort(function(a,b){
    return (b[1].total>0?b[1].tk/b[1].total:0)-(a[1].total>0?a[1].tk/a[1].total:0);
  }).slice(0,1);

  // Umsatz/Stunde gestern
  var umsatzStdG = paStdG>0?kG.u/paStdG:0;

  // Context zusammenbauen
  var ctx = "Bitte erstelle einen kompakten, textbasierten Tagesbericht für Bang Bang Noodles Berlin für gestern ("+gestern+").\n";
  ctx += "Schreibe den Bericht auf Deutsch, professionell aber direkt. Keine Tabellen — fließender Text mit kurzen Absätzen pro Thema.\n";
  ctx += "Hebe BESONDERHEITEN hervor: was war ungewöhnlich gut, schlecht oder auffällig? Sei konkret und nenne Zahlen.\n\n";

  ctx += "=== GESTRIGE DATEN ("+gestern+") ===\n";
  ctx += "Umsatz Netto gesamt: "+fmt(kG.u)+"\n";
  ctx += "  Mehringdamm: "+fmt(kGMd.u)+"\n";
  ctx += "  Rosenthaler Straße: "+fmt(kGRs.u)+"\n";
  ctx += "Vorwoche gleicher Tag ("+vorwocheISO+"): "+fmt(kV.u)+" → Differenz: "+(kV.u>0?(((kG.u-kV.u)/kV.u)*100).toFixed(1)+"%" : "keine Daten")+"\n";
  ctx += "Ø letzte 7 Tage: "+fmt(kW.u/tageW)+"/Tag\n";
  var brRfc=getRealFC("Alle Standorte");
  var brGesternISO=gesternD.getFullYear()+'-'+String(gesternD.getMonth()+1).padStart(2,'0')+'-'+String(gesternD.getDate()).padStart(2,'0');
  var brHatIst=istInBestandZeitraum(brGesternISO,brGesternISO,brRfc);
  ctx += "Food Cost: "+(brHatIst?"Ist (direkt) "+fmtP(brRfc.quote)+" (aus Bestandsbericht "+brRfc.von+"→"+brRfc.bis+")":"Soll "+fmtP(kG.fp)+(brRfc.hat?" — Zeitraum außerhalb Bestandsbericht ("+brRfc.von+"→"+brRfc.bis+")":""))+" (Ziel 25%)\n";
  ctx += "  Mehringdamm FC: "+(brHatIst?"Ist "+fmtP(brRfc.md.quote):"Soll "+fmtP(kGMd.fp))+"\n";
  ctx += "  Rosenthaler FC: "+(brHatIst?"Ist "+fmtP(brRfc.rs.quote):"Soll "+fmtP(kGRs.fp))+"\n";
  ctx += "Ø Bon-Wert: "+fmtD(bwG.avg)+" aus "+bwG.count+" Bons (Ziel €22)\n";
  ctx += "Lieferando Brutto: "+fmt(ldoBruttoG)+" ("+fmtP(ldoAnteilG)+" vom Umsatz)\n\n";

  ctx += "=== PERSONAL ===\n";
  ctx += "Operative Personalkosten: "+fmt(paCostG)+" ("+fmtP(paQuoteG)+" vom Umsatz, Ziel 22%)\n";
  ctx += "Ø Personal-Quote letzte 7 Tage: "+fmtP(paQuoteW)+"\n";
  ctx += "Umsatz/Personalstunde: "+fmt(umsatzStdG)+"/h (Ziel €75)\n";
  if(smG.length>0){
    ctx += "Social Media eingeplant: "+smG.map(function(r){return r.mitarbeiter+" ("+r.standort+", "+r.startZeit+"–"+r.endeZeit+")";}).join(", ")+"\n";
  } else {
    ctx += "Social Media: niemand eingeplant\n";
  }
  ctx += "Schichten gestern: "+ordioG.length+" gesamt\n";
  var bereiche = {};
  ordioG.forEach(function(r){bereiche[r.bereich]=(bereiche[r.bereich]||0)+1;});
  ctx += "Bereiche: "+Object.entries(bereiche).map(function(e){return e[0]+": "+e[1];}).join(", ")+"\n\n";

  ctx += "=== WASTE ===\n";
  ctx += "Mehringdamm: "+(wasteGMd.length>0?fmt(wasteGMdTotal)+" ("+wasteGMd.length+" Positionen)":" KEIN Waste erfasst ⚠️")+"\n";
  ctx += "Rosenthaler Straße: "+(wasteGRs.length>0?fmt(wasteGRsTotal)+" ("+wasteGRs.length+" Positionen)":" KEIN Waste erfasst ⚠️")+"\n";
  if(wasteGMd.length>0){
    var topWMd = wasteGMd.sort(function(a,b){return b.kosten-a.kosten;}).slice(0,3);
    ctx += "Top Waste MD: "+topWMd.map(function(r){return r.artikel+" ("+fmt(r.kosten)+", "+r.kategorie+")";}).join(", ")+"\n";
  }
  if(wasteGRs.length>0){
    var topWRs = wasteGRs.sort(function(a,b){return b.kosten-a.kosten;}).slice(0,3);
    ctx += "Top Waste RS: "+topWRs.map(function(r){return r.artikel+" ("+fmt(r.kosten)+", "+r.kategorie+")";}).join(", ")+"\n";
  }
  ctx += "\n";

  ctx += "=== TRINKGELD & STORNOS ===\n";
  ctx += "TK-Quote gestern: "+fmtP(tkQuoteG)+" (Gesamtbetrag: "+fmt(tkG)+")\n";
  if(bestTK.length>0){
    var bTK = bestTK[0];
    ctx += "Bester Service-MA: "+bTK[0]+" ("+fmtP(bTK[1].total>0?bTK[1].tk/bTK[1].total:0)+" Quote, "+fmt(bTK[1].tk)+" TK)\n";
  }
  ctx += "Stornos: "+stornosG+" (Ø letzte 7 Tage: "+stornosW.toFixed(1)+"/Tag)\n";
  // Storno-Details (Gründe) wenn vorhanden
  var sdCtx=stornoDetails.filter(function(r){return r.datum===gestern;});
  if(sdCtx.length>0){
    var sdDefMap={};
    sdCtx.forEach(function(r){var d=r.stornodefinition||"Unbekannt";sdDefMap[d]=(sdDefMap[d]||0)+1;});
    ctx += "Storno-Gründe gestern: "+Object.entries(sdDefMap).map(function(e){return e[0]+" "+e[1]+"x";}).join(", ")+"\n";
    var sdArtMap={};
    sdCtx.filter(function(r){return r.betrag<0;}).forEach(function(r){sdArtMap[r.artikel]=(sdArtMap[r.artikel]||0)+1;});
    var sdTopArt=Object.entries(sdArtMap).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
    if(sdTopArt.length>0) ctx += "Stornierte Artikel: "+sdTopArt.map(function(e){return e[0]+" "+e[1]+"x";}).join(", ")+"\n";
  }
  ctx += "\n";

  ctx += "=== TOP 5 ARTIKEL GESTERN ===\n";
  topArtG.forEach(function(e){
    ctx += e[0]+": "+Math.round(e[1].menge)+"x ("+fmt(e[1].umsatz)+")\n";
  });
  ctx += "\n";

  ctx += "Bitte analysiere diese Daten und schreibe einen Tagesbericht. Struktur: kurze Zusammenfassung, dann Besonderheiten pro Thema (Umsatz, Personal, Food Cost/Waste, Trinkgeld). Keine Aufzählungslisten — Fließtext.";

  return ctx;
}

function sendTagesbericht() {
  var ctx = buildTagesberichtContext();
  // Panel öffnen falls zu
  if(!aiOpen) toggleAiPanel();
  document.getElementById("ai-suggestions").style.display = "none";

  // Sichtbare Nachricht im Chat (kurz)
  var gesternD = new Date(); gesternD.setDate(gesternD.getDate()-1);
  var gestern = String(gesternD.getDate()).padStart(2,'0')+'.'+String(gesternD.getMonth()+1).padStart(2,'0')+'.'+gesternD.getFullYear();
  addAiMessage("user", "📋 Tagesbericht für " + gestern + " generieren");

  // Langen Kontext unsichtbar an API schicken
  aiHistory.push({role:"user", content: ctx});
  aiThinking = true;
  document.getElementById("ai-send").disabled = true;
  var thinkingEl = addAiMessage("assistant thinking", "⏳ Erstelle Tagesbericht...");

  var systemPrompt = "Du bist ein erfahrener Restaurant-Betriebsanalyst für Bang Bang Noodles Berlin. " +
    "Du sprichst Deutsch, bist direkt, konkret und datenbasiert. " +
    "Keine langen Einleitungen — komm direkt zum Punkt. " +
    "Nenne immer konkrete Zahlen aus den Daten. " +
    "Schreibe in fließendem Text, keine Aufzählungslisten, keine Tabellen.\n\n" +
    buildAiContext();

  var apiKey = localStorage.getItem("bbn_ai_key") || "";
  if(!apiKey) {
    thinkingEl.remove();
    addAiMessage("assistant", "⚠️ Bitte zuerst den Anthropic API Key eingeben (oben im Chat-Fenster).");
    aiThinking = false;
    document.getElementById("ai-send").disabled = false;
    aiHistory.pop();
    return;
  }

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:systemPrompt,messages:aiHistory})
  }).then(function(r){
    if(!r.ok) return r.json().then(function(err){throw new Error((err.error&&err.error.message)||"HTTP "+r.status);});
    return r.json();
  }).then(function(data){
    thinkingEl.remove();
    var reply = data.content && data.content[0] ? data.content[0].text : "Fehler beim Generieren.";
    addAiMessage("assistant", reply);
    aiHistory.push({role:"assistant", content:reply});
    aiThinking = false;
    document.getElementById("ai-send").disabled = false;
  }).catch(function(e){
    thinkingEl.remove();
    var msg=e.message||"";
    if(msg==="Failed to fetch") msg="Verbindung zur API fehlgeschlagen. Mögliche Ursachen: API-Key ungültig/abgelaufen, Netzwerk blockiert, oder CORS-Problem. Bitte Key prüfen.";
    else if(msg.indexOf("401")!==-1||msg.indexOf("authentication")!==-1) msg="API-Key ungültig oder abgelaufen. Bitte neuen Key eingeben.";
    else if(msg.indexOf("429")!==-1) msg="Zu viele Anfragen — bitte kurz warten und erneut versuchen.";
    else if(msg.indexOf("overloaded")!==-1) msg="API überlastet — bitte in 1-2 Minuten erneut versuchen.";
    addAiMessage("assistant", "⚠️ "+msg);
    aiThinking = false;
    document.getElementById("ai-send").disabled = false;
    aiHistory.pop();
  });
}

function buildTagesberichtHTML(vonParam, bisParam) {
  // Standard: gestern
  var gesternD = new Date();
  gesternD.setDate(gesternD.getDate()-1);
  var gestern = String(gesternD.getDate()).padStart(2,'0')+'.'+String(gesternD.getMonth()+1).padStart(2,'0')+'.'+gesternD.getFullYear();
  var zieldatum = vonParam || gestern;

  // Vorwoche gleicher Tag
  var vorwocheD = new Date(gesternD);
  vorwocheD.setDate(vorwocheD.getDate()-7);
  var vorwoche = vorwocheD.toISOString().slice(0,10).split('-').reverse().join('.');

  // Daten gestern
  var gAll  = alle.filter(function(r){return r.datum===zieldatum;});
  var gMd   = gAll.filter(function(r){return r.st==="Mehringdamm";});
  var gRs   = gAll.filter(function(r){return r.st==="Rosenthaler Straße";});
  var kG    = kpi(gAll), kGMd = kpi(gMd), kGRs = kpi(gRs);

  // Vorwoche
  var vAll  = alle.filter(function(r){return r.datum===vorwoche;});
  var kV    = kpi(vAll);
  var umsatzDiff = kV.u>0?((kG.u-kV.u)/kV.u*100):null;

  // Ø letzte 7 Tage
  var letzteWoche = alle.filter(function(r){return r.datum<zieldatum;}).slice(-14);
  var kW = kpi(letzteWoche);
  var tageW = new Set(letzteWoche.map(function(r){return r.datum;})).size||1;

  // Personal gestern
  var ordioG   = ordio.filter(function(r){return r.datum===zieldatum;});
  var ordioOpa = ordioG.filter(function(r){return r.bereich!=="Social Media"&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1;});
  var paCostG  = ordioOpa.reduce(function(s,r){return s+r.kosten;},0);
  var paStdG   = ordioOpa.reduce(function(s,r){return s+r.stunden;},0);
  var paQuoteG = kG.u>0?paCostG/kG.u:0;
  var smG      = ordioG.filter(function(r){return r.bereich==="Social Media";});
  var umsatzStdG = paStdG>0?kG.u/paStdG:0;

  // Ø Personal letzte 7 Tage
  var ordioW   = ordio.filter(function(r){return r.datum<zieldatum;});
  var ordioWOpa = ordioW.filter(function(r){return r.bereich!=="Social Media"&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1;});
  var paCostW  = ordioWOpa.reduce(function(s,r){return s+r.kosten;},0);
  var paQuoteW = kW.u>0?paCostW/kW.u:0;

  // Waste gestern
  var wasteGMd  = waste.filter(function(r){return r.datum===zieldatum&&r.standort==="Mehringdamm";});
  var wasteGRs  = waste.filter(function(r){return r.datum===zieldatum&&r.standort==="Rosenthaler Straße";});
  var wasteGMdT = wasteGMd.reduce(function(s,r){return s+r.kosten;},0);
  var wasteGRsT = wasteGRs.reduce(function(s,r){return s+r.kosten;},0);

  // Bons gestern
  var bonsGAll  = bons.filter(function(r){return r.datum===zieldatum;});
  var bwG       = getBonWert(zieldatum,zieldatum,"Alle Standorte");
  var bonsInhouse = bonsGAll.filter(function(r){return r.kanal!=="Lieferando";});
  var tkG       = bonsInhouse.reduce(function(s,r){return s+r.trinkgeld;},0);
  var tkTotalG  = bonsInhouse.reduce(function(s,r){return s+r.total;},0);
  var tkQuoteG  = tkTotalG>0?tkG/tkTotalG:0;
  var stornosG  = bonsGAll.filter(function(r){return r.storniert===1;}).length;

  // Ø Stornos letzte 7 Tage
  var bonsW    = bons.filter(function(r){return r.datum<zieldatum;});
  var stornosW = bonsW.filter(function(r){return r.storniert===1;}).length/tageW;

  // Bester TK-MA
  var maMapTK = {};
  bonsInhouse.filter(function(r){return r.mitarbeiter&&r.mitarbeiter.indexOf(",")===-1&&r.mitarbeiter.indexOf("Online")===-1;}).forEach(function(r){
    if(!maMapTK[r.mitarbeiter])maMapTK[r.mitarbeiter]={tk:0,total:0,bons:0};
    maMapTK[r.mitarbeiter].tk+=r.trinkgeld;
    maMapTK[r.mitarbeiter].total+=r.total;
    maMapTK[r.mitarbeiter].bons++;
  });
  var bestTK = Object.entries(maMapTK).filter(function(e){return e[1].bons>=3;}).sort(function(a,b){
    return (b[1].total>0?b[1].tk/b[1].total:0)-(a[1].total>0?a[1].tk/a[1].total:0);
  });

  // Lieferando gestern
  var txG        = lsTx.filter(function(r){return r.datum===zieldatum;});
  var ldoBruttoG = txG.reduce(function(s,r){return s+r.ldo;},0);
  var ldoAnteilG = kG.u>0?ldoBruttoG/kG.u:0;

  // Anomalien sammeln
  var anomalien = [];
  if(stornosG>stornosW*2&&stornosG>2) anomalien.push("⚠️ Stornos: "+stornosG+"x — deutlich über Ø ("+stornosW.toFixed(1)+"/Tag)");
  if(bwG.avg>0&&bwG.avg<ZIELE.bonWert*0.8) anomalien.push("⚠️ Ø Bon-Wert "+fmtD(bwG.avg)+" — deutlich unter Ziel €"+ZIELE.bonWert);
  if(paQuoteG>ZIELE.pa*1.15) anomalien.push("⚠️ Personalquote "+fmtP(paQuoteG)+" — "+fmtP(paQuoteG-ZIELE.pa)+" über Ziel");
  if(kG.fp>ZIELE.fc*1.15) anomalien.push("⚠️ Food Cost "+fmtP(kG.fp)+" — "+fmtP(kG.fp-ZIELE.fc)+" über Ziel");
  if(wasteGMd.length===0) anomalien.push("⚠️ Kein Waste erfasst: Mehringdamm");
  if(wasteGRs.length===0) anomalien.push("⚠️ Kein Waste erfasst: Rosenthaler Straße");
  if(smG.length>0) anomalien.push("ℹ️ Social Media: "+smG.map(function(r){return r.mitarbeiter+" ("+r.standort.replace("Rosenthaler Straße","Rosi")+", "+r.startZeit+"–"+r.endeZeit+")";}).join(", "));

  function section(emoji, titel, col, inhalt) {
    return '<div style="margin-bottom:14px;padding:12px 14px;background:#0f1829;border-radius:8px;border-left:3px solid '+col+'">'+
      '<div style="font-size:12px;font-weight:700;color:'+col+';margin-bottom:6px">'+emoji+' '+titel+'</div>'+
      '<div style="font-size:12px;color:#94a3b8;line-height:1.7">'+inhalt+'</div>'+
    '</div>';
  }

  // Umsatz-Text
  var umsatzText = 'Gestern <b style="color:#f1f5f9">'+fmt(kG.u)+'</b> Netto.';
  if(umsatzDiff!==null) umsatzText += ' <span style="color:'+(umsatzDiff>=0?'#22c55e':'#ef4444')+'">'+(umsatzDiff>=0?'+':'')+umsatzDiff.toFixed(1)+'%</span> vs. Vorwoche ('+vorwoche+': '+fmt(kV.u)+').';
  umsatzText += ' Ø letzte 7 Tage: '+fmt(kW.u/tageW)+'/Tag.';
  if(kGMd.u>0||kGRs.u>0) umsatzText += '<br>Mehringdamm <b style="color:#E84393">'+fmt(kGMd.u)+'</b> · Rosenthaler <b style="color:#00EEFC">'+fmt(kGRs.u)+'</b>.';
  if(ldoBruttoG>0) umsatzText += ' Lieferando: '+fmt(ldoBruttoG)+' ('+fmtP(ldoAnteilG)+' vom Umsatz).';

  // Personal-Text
  var paText = 'Operative Personalkosten <b style="color:#f1f5f9">'+fmt(paCostG)+'</b> (<span style="color:'+(paQuoteG>ZIELE.pa?'#ef4444':'#22c55e')+'">'+fmtP(paQuoteG)+'</span>, Ziel 22%).';
  paText += ' Ø letzte 7 Tage: '+fmtP(paQuoteW)+'.';
  paText += ' Umsatz/Stunde: <span style="color:'+(umsatzStdG>=ZIELE.umsatzStd?'#22c55e':'#ef4444')+'">'+fmt(umsatzStdG)+'</span> (Ziel €75).';
  if(smG.length>0) paText += '<br>Social Media: '+smG.map(function(r){return '<b style="color:#E84393">'+r.mitarbeiter+'</b> ('+r.standort.replace("Rosenthaler Straße","Rosi")+', '+r.startZeit+'-'+r.endeZeit+')';}).join(', ')+'.';
  paText += ' Schichten: '+ordioG.length+' gesamt.';

  // Waste-Text
  var wasteText = '';
  wasteText += 'Mehringdamm: '+(wasteGMd.length>0?'<b style="color:#f1f5f9">'+fmt(wasteGMdT)+'</b> ('+wasteGMd.length+' Pos.)':'<span style="color:#ef4444">nicht erfasst</span>')+'.';
  wasteText += ' Rosenthaler: '+(wasteGRs.length>0?'<b style="color:#f1f5f9">'+fmt(wasteGRsT)+'</b> ('+wasteGRs.length+' Pos.)':'<span style="color:#ef4444">nicht erfasst</span>')+'.';
  var topWasteAll = wasteGMd.concat(wasteGRs).sort(function(a,b){return b.kosten-a.kosten;}).slice(0,3);
  if(topWasteAll.length>0) wasteText += '<br>Größte Posten: '+topWasteAll.map(function(r){return r.artikel+' '+fmt(r.kosten)+' ('+r.kategorie+')';}).join(', ')+'.';

  // TK-Text
  var tkText = 'TK-Quote: <b style="color:'+(tkQuoteG>=0.05?'#22c55e':'#E84393')+'">'+fmtP(tkQuoteG)+'</b> ('+fmt(tkG)+' gesamt).';
  if(bestTK.length>0) tkText += ' Bester MA: <b style="color:#f1f5f9">'+bestTK[0][0]+'</b> ('+fmtP(bestTK[0][1].total>0?bestTK[0][1].tk/bestTK[0][1].total:0)+' Quote).';
  tkText += ' Stornos: <span style="color:'+(stornosG>stornosW*1.5&&stornosG>1?'#ef4444':'#94a3b8')+'">'+stornosG+'x</span> (Ø '+stornosW.toFixed(1)+'/Tag).';

  var html = '<div style="font-size:11px;color:#475569;margin-bottom:10px">Automatisch berechnet · Daten vom '+zieldatum+'</div>';
  html += section('💰','Umsatz',umsatzDiff===null?'#64748b':umsatzDiff>=0?'#22c55e':'#ef4444', umsatzText);
  html += section('👥','Personal',paQuoteG>ZIELE.pa*1.1?'#ef4444':paQuoteG>ZIELE.pa?'#E84393':'#22c55e', paText);
  html += section('🗑️','Food Cost & Waste',kG.fp>ZIELE.fc?'#ef4444':'#22c55e', wasteText);
  html += section('💝','Trinkgeld & Stornos',tkQuoteG>=0.05?'#22c55e':'#E84393', tkText);
  if(anomalien.length>0) {
    html += section('⚠️','Besonderheiten','#E84393', anomalien.join('<br>'));
  }

  return html;
}

function generiereKIBericht() {
  var apiKey = localStorage.getItem("bbn_ai_key") || "";
  if(!apiKey) {
    document.getElementById("ki-bericht-inhalt").innerHTML = 
      '<div style="color:#E84393">⚠️ Bitte zuerst den Anthropic API Key im KI-Chat eingeben.</div>';
    return;
  }

  var btn = document.getElementById("btn-bericht");
  var inhalt = document.getElementById("ki-bericht-inhalt");
  btn.disabled = true;
  btn.textContent = "⏳ Generiere...";
  inhalt.innerHTML = '<div style="color:#475569;font-style:italic">KI analysiert die Daten...</div>';

  var von = document.getElementById("von").value; // YYYY-MM-DD
  var bis = document.getElementById("bis").value; // YYYY-MM-DD
  var st  = document.getElementById("standort").value;
  // Display format für Prompt (DD.MM.YYYY)
  function toDE(s){return s?s.split("-").reverse().join("."):"";} 
  var vonDE = toDE(von);
  var bisDE = toDE(bis);

  // Daten aufbereiten — erst alles definieren, dann Stundenfilter anwenden
  var tage = new Set(gefiltert.map(function(r){return r.datum;})).size||1;
  var md = gefiltert.filter(function(r){return r.st==="Mehringdamm";});
  var rs = gefiltert.filter(function(r){return r.st==="Rosenthaler Straße";});
  var k   = kpi(gefiltert);
  var km  = kpi(md), kr = kpi(rs);
  var pk  = hatStundenfilter()?getOrdioStunden(von,bis,st):getOrdio(von,bis,st);
  var pkMd = hatStundenfilter()?getOrdioStunden(von,bis,"Mehringdamm"):getOrdio(von,bis,"Mehringdamm");
  var pkRs = hatStundenfilter()?getOrdioStunden(von,bis,"Rosenthaler Straße"):getOrdio(von,bis,"Rosenthaler Straße");

  // Stundenfilter anwenden (nach Definition aller Variablen)
  if(hatStundenfilter()){
    var avgFcQKI = getAvgFcQuote(st);
    var uStdKI   = getUmsatzGefiltert(von,bis,st);
    var uMdStdKI = getUmsatzGefiltert(von,bis,"Mehringdamm");
    var uRsStdKI = getUmsatzGefiltert(von,bis,"Rosenthaler Straße");
    k  = {u:uStdKI.u,   f:uStdKI.u*avgFcQKI,   s:k.s,  t:k.t,  fp:avgFcQKI, at:k.at};
    km = {u:uMdStdKI.u, f:uMdStdKI.u*avgFcQKI, s:km.s, t:km.t, fp:avgFcQKI, at:km.at};
    kr = {u:uRsStdKI.u, f:uRsStdKI.u*avgFcQKI, s:kr.s, t:kr.t, fp:avgFcQKI, at:kr.at};
  }

  var pa  = pk.total>0?pk.total:k.u*0.33;
  var paQuote = k.u>0?pa/k.u:0;
  var smKosten = getSocialMediaKosten(von,bis,st);
  var fkOv = getFixkostenTage(von,bis);
  // Datentage-Alignment
  var briefDatumSet={}; gefiltert.forEach(function(r){briefDatumSet[r.datum]=1;});
  var briefDataTage=k.t, briefKalTage=fkOv.tage;
  var ldoProv = lsTx.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&briefDatumSet[r.datum];}).reduce(function(s,r){return s+r.ldo;},0)*0.20;
  if(briefDataTage<briefKalTage){
    var bFk=briefDataTage/briefKalTage;
    Object.keys(fkOv).forEach(function(key){if(key!=="tage")fkOv[key]=fkOv[key]*bFk;});
    fkOv.tage=briefDataTage;
  }
  var cm = k.u-k.f-ldoProv-pa;
  var ebitda = cm-fkOv.gesamt-smKosten;
  var umsatzStd = pk.stunden>0?k.u/pk.stunden:0;
  var bonWertData = getBonWert(von,bis,st);
  var bonWertMd = getBonWert(von,bis,"Mehringdamm");
  var bonWertRs = getBonWert(von,bis,"Rosenthaler Straße");

  // Vorperiode (nutzt gleiche Logik wie Dashboard: ≤7T → VW, >7T → gleich langer Zeitraum davor)
  var vpKI=prevPeriod(von,bis);
  var vorperiode = alle.filter(function(r){return r.datum>=vpKI.von&&r.datum<=vpKI.bis&&(st==="Alle Standorte"||r.st===st);});
  if(vpKI.tage<=7){
    var wt={};for(var _d=new Date(von);_d<=new Date(bis);_d.setDate(_d.getDate()+1)){wt[_d.getDay()]=true;}
    vorperiode=vorperiode.filter(function(r){return !!wt[new Date(r.datum).getDay()];});
  }
  var kVor = kpi(vorperiode);
  var uDiff = kVor.u>0?((k.u-kVor.u)/kVor.u*100):null;

  // Waste
  var wasteMd = waste.filter(function(r){return r.datum>=von&&r.datum<=bis&&r.standort==="Mehringdamm"&&datumPasstWT(r.datum);});
  var wasteRs = waste.filter(function(r){return r.datum>=von&&r.datum<=bis&&r.standort==="Rosenthaler Straße"&&datumPasstWT(r.datum);});
  var wasteMdT = wasteMd.reduce(function(s,r){return s+r.kosten;},0);
  var wasteRsT = wasteRs.reduce(function(s,r){return s+r.kosten;},0);

  // Trinkgeld
  var bonsGef = bons.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  var bonsInh = bonsGef.filter(function(r){return r.kanal!=="Lieferando";});
  var tkGes = bonsInh.reduce(function(s,r){return s+r.trinkgeld;},0);
  var tkTot = bonsInh.reduce(function(s,r){return s+r.total;},0);
  var tkQ = tkTot>0?tkGes/tkTot:0;
  var stornosN = bonsGef.filter(function(r){return r.storniert===1;}).length;

  // LDO
  var txGef = lsTx.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  var ldoBrutto = txGef.reduce(function(s,r){return s+r.ldo;},0);

  // Social Media
  var smAll = pk.data.filter(function(r){return r.bereich==="Social Media";});

  // Prompt aufbauen
  var stundenInfo = hatStundenfilter()?" im Zeitraum "+stundenLabel():""; var prompt = "Betriebsanalyst Bang Bang Noodles Berlin. Tagesbericht"+stundenInfo+" fuer "+vonDE+(vonDE!==bisDE?"-"+bisDE:"")+". Kurz, direkt, Zahlen nennen.\n\n";
  prompt += "Schreibe einen kurzen, interpretierten Tagesbericht auf Deutsch. NICHT einfach Zahlen aufzaehlen - erklaere was die Zahlen BEDEUTEN, warum sie gut oder schlecht sind, und welche Rueckschluesse man ziehen kann. Struktur: 4-5 kurze Abschnitte mit Ueberschrift. Direkte, klare Sprache.\n\n";
  prompt += "ZEITRAUM: "+vonDE+(vonDE!==bisDE?" bis "+bisDE:"")+" ("+tage+" Tag"+(tage!==1?"e":"")+")\n\n";
  prompt += "UMSATZ:\n";
  prompt += "- Gesamt Netto: "+fmt(k.u)+" | Durchschnitt "+fmt(k.u/tage)+"/Tag\n";
  prompt += "- Mehringdamm: "+fmt(km.u)+" | Rosenthaler: "+fmt(kr.u)+"\n";
  if(uDiff!==null) prompt += "- Vergleich "+vpKI.label+" ("+toDE(vpKI.von)+"–"+toDE(vpKI.bis)+"): "+(uDiff>=0?"+":"")+uDiff.toFixed(1)+"% ("+vpKI.label+": "+fmt(kVor.u)+")\n";
  prompt += "- Lieferando Brutto: "+fmt(ldoBrutto)+" ("+(k.u>0?(ldoBrutto/k.u*100).toFixed(1):0)+"% vom Umsatz)\n";
  prompt += "- Bon-Wert: "+fmtD(bonWertData.avg)+" (MD: "+fmtD(bonWertMd.avg)+" | RS: "+fmtD(bonWertRs.avg)+") | Ziel: 22 Euro\n\n";
  prompt += "PERSONAL:\n";
  prompt += "- Operative Kosten: "+fmt(pa)+" ("+(k.u>0?(paQuote*100).toFixed(1):0)+"% vom Umsatz) | Ziel: 22%\n";
  prompt += "- Mehringdamm: "+fmt(pkMd.total)+" ("+(km.u>0?(pkMd.total/km.u*100).toFixed(1):0)+"%) | Rosenthaler: "+fmt(pkRs.total)+" ("+(kr.u>0?(pkRs.total/kr.u*100).toFixed(1):0)+"%)\n";
  prompt += "- Umsatz/Personalstunde: "+fmt(umsatzStd)+"/h | Ziel: 75 Euro\n";
  if(smAll.length>0) prompt += "- Social Media: "+smAll.map(function(r){return r.mitarbeiter+" ("+r.standort.replace("Rosenthaler Strasse","Rosi")+")";}).join(", ")+"\n";
  var kiRfc=getRealFC("Alle Standorte");
  var kiHatIst=istInBestandZeitraum(von,bis,kiRfc);
  prompt += "\nFOOD COST & WASTE:\n";
  if(kiHatIst){
    var kiFcAmt=kiRfc.quote*k.u;
    prompt += "- ECHTE Food Cost (Ist direkt aus Bestandsbericht): "+fmtP(kiRfc.quote)+" = "+fmt(kiFcAmt)+" | Ziel: 25%\n";
    prompt += "- Basis: "+kiRfc.von+" → "+kiRfc.bis+" ("+kiRfc.tage+" Tage, "+fmt(kiRfc.revBestand)+" Umsatz im Zeitraum)\n";
    prompt += "- Aufschluesselung (Anteile am Umsatz): Verkauft "+fmtP(kiRfc.revBestand>0?kiRfc.verkauft/kiRfc.revBestand:0)+" | Verschwendet "+fmtP(kiRfc.revBestand>0?kiRfc.verschwendet/kiRfc.revBestand:0)+" | Schwund "+fmtP(kiRfc.revBestand>0?kiRfc.unkontrolliert/kiRfc.revBestand:0)+"\n";
    prompt += "- Mehringdamm Ist-FC: "+fmtP(kiRfc.md.quote)+" | Rosenthaler Ist-FC: "+fmtP(kiRfc.rs.quote)+"\n";
    prompt += "- Soll-FC (Rezeptur): "+fmtP(k.fp)+" ("+fmt(k.f)+") — Abweichung Ist vs Soll: "+fmtP(kiRfc.quote-k.fp)+"\n";
  } else {
    prompt += "- Food Cost (Soll/Rezeptur): "+fmt(k.f)+" ("+fmtP(k.fp)+") | Ziel: 25%\n";
    if(kiRfc.hat) prompt += "- HINWEIS: Zeitraum liegt außerhalb Bestandsbericht ("+kiRfc.von+" → "+kiRfc.bis+"), daher Soll-Werte\n";
    prompt += "- Mehringdamm FC: "+fmtP(km.fp)+" | Rosenthaler FC: "+fmtP(kr.fp)+"\n";
  }
  prompt += "- Waste Mehringdamm: "+(wasteMd.length>0?fmt(wasteMdT)+" ("+wasteMd.length+" Positionen)":"NICHT ERFASST")+"\n";
  prompt += "- Waste Rosenthaler: "+(wasteRs.length>0?fmt(wasteRsT)+" ("+wasteRs.length+" Positionen)":"NICHT ERFASST")+"\n\n";
  prompt += "TRINKGELD & STORNOS:\n";
  prompt += "- TK-Quote: "+fmtP(tkQ)+" | Gesamt: "+fmt(tkGes)+" | Ziel: 5%\n";
  prompt += "- Stornierungen: "+stornosN+"x\n\n";
  var kiFC=kiHatIst?kiRfc.quote*k.u:k.f;
  var kiCM=k.u-kiFC-ldoProv-pa;
  var kiEBITDA=kiCM-fkOv.gesamt-smKosten;
  prompt += "ERGEBNIS:\n";
  prompt += "- Contribution Margin: "+fmt(kiCM)+" ("+fmtP(k.u>0?kiCM/k.u:0)+") | Ziel: 40%\n";
  prompt += "- EBITDA (geschaetzt): "+fmt(kiEBITDA)+" ("+fmtP(k.u>0?kiEBITDA/k.u:0)+") | Ziel: 10%\n\n";
  prompt += "Schreibe jetzt den Tagesbericht. Formatiere jeden Abschnitt GENAU so in HTML:\n\n<div style=\"margin-bottom:16px\"><div style=\"font-weight:700;color:#f1f5f9;font-size:13px;margin-bottom:6px\">💰 Umsatz</div><ul style=\"margin:0;padding-left:16px;color:#94a3b8;font-size:12px;line-height:1.8\"><li>Kernaussage als Satz</li><li>Vergleich/Einordnung</li><li>Handlungsempfehlung falls noetig</li></ul></div>\n\nVerwende diese 4 Abschnitte: 💰 Umsatz, 👥 Personal, 🥩 Food Cost und Waste, 💝 Trinkgeld. Falls es wichtige Besonderheiten gibt, fuege ⚠️ Besonderheiten hinzu. Maximal 3 Bulletpoints pro Abschnitt. Direkt und konkret, nenne Zahlen. Fange sofort mit dem ersten div an, kein Text davor.";

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 800,
      messages: [{role: "user", content: prompt}]
    })
  }).then(function(r){
    if(!r.ok) return r.json().then(function(err){throw new Error((err.error&&err.error.message)||"HTTP "+r.status);});
    return r.json();
  }).then(function(data){
    btn.disabled = false;
    btn.textContent = "🤖 Aktualisieren";
    if(data.content && data.content[0]) {
      var text = data.content[0].text;
      inhalt.innerHTML = text;
    } else {
      inhalt.innerHTML = '<div style="color:#ef4444">Fehler: '+JSON.stringify(data.error||data)+'</div>';
    }
  }).catch(function(e){
    btn.disabled = false;
    btn.textContent = "🤖 Aktualisieren";
    var msg=e.message||"";
    if(msg==="Failed to fetch") msg="Verbindung zur API fehlgeschlagen. API-Key prüfen oder später erneut versuchen.";
    inhalt.innerHTML = '<div style="color:#ef4444">⚠️ '+msg+'</div>';
  });
}

function buildAiContext() {
  var von = document.getElementById("von").value;
  var bis = document.getElementById("bis").value;
  var st = document.getElementById("standort").value;
  function status(val,ziel,inv){var ok=inv?val<=ziel:val>=ziel;var warn=inv?val<=ziel*1.1:val>=ziel*0.9;return ok?"✅":warn?"⚠️":"🔴";}

  var ctx = "FILTER: " + von + " bis " + bis + " | Standort: " + st + "\n\n";

  // KPIs
  var kFilt = kpi(gefiltert);
  var tage = kFilt.t || 1;
  var mdFilt = gefiltert.filter(function(r){return r.st==="Mehringdamm";});
  var rsFilt = gefiltert.filter(function(r){return r.st==="Rosenthaler Straße";});
  var kMD = kpi(mdFilt), kRS = kpi(rsFilt);

  ctx += "UMSATZ:\n";
  ctx += "Gesamt Netto: " + fmt(kFilt.u) + " | Ø " + fmt(kFilt.u/tage) + "/Tag | " + tage + " Tage\n";
  ctx += "MD: " + fmt(kMD.u) + " (" + fmtP(kFilt.u>0?kMD.u/kFilt.u:0) + ") | RS: " + fmt(kRS.u) + " (" + fmtP(kFilt.u>0?kRS.u/kFilt.u:0) + ")\n";
  ctx += "Verkäufe: " + kFilt.s + " | Ø Bon-Wert: " + fmtD(kFilt.at) + " " + status(kFilt.at,ZIELE.bonWert,false) + " (Ziel ≥€" + ZIELE.bonWert + ")\n";
  ctx += "MD Ø Bon: " + fmtD(kMD.at) + " | RS Ø Bon: " + fmtD(kRS.at) + "\n\n";

  ctx += "FOOD COST:\n";
  ctx += "Gesamt: " + fmt(kFilt.f) + " (" + fmtP(kFilt.fp) + ") " + status(kFilt.fp,ZIELE.fc,true) + " (Ziel ≤25%)\n";
  ctx += "MD: " + fmtP(kMD.fp) + " " + status(kMD.fp,ZIELE.fc,true) + " | RS: " + fmtP(kRS.fp) + " " + status(kRS.fp,ZIELE.fc,true) + "\n";
  try {
    var rfc = getRealFC(st);
    if(rfc && rfc.md) {
      ctx += "Bestandsbericht (Ist-FC): MD " + fmtP(rfc.md.quote) + " (" + fmt(rfc.md.fc) + ") | RS " + fmtP(rfc.rs.quote) + " (" + fmt(rfc.rs.fc) + ")\n";
      ctx += "Verschwendung: MD " + fmt(rfc.md.verschwendet) + " | RS " + fmt(rfc.rs.verschwendet) + "\n";
      ctx += "Unkontrollierter Schwund: MD " + fmt(rfc.md.unkontrolliert) + " | RS " + fmt(rfc.rs.unkontrolliert) + "\n";
    }
  } catch(e){}
  ctx += "\n";

  // Personal
  var ordioOp = ordio.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&MGMT_MITARBEITER.indexOf(r.mitarbeiter)===-1&&r.bereich!=="Social Media"&&datumPasstWT(r.datum);});
  if(ordioOp.length > 0) {
    var paTotal = ordioOp.reduce(function(s,r){return s+r.kosten;},0);
    var paStd = ordioOp.reduce(function(s,r){return s+r.stunden;},0);
    var paQ = kFilt.u>0?paTotal/kFilt.u:0;
    var uStd = paStd>0?kFilt.u/paStd:0;
    ctx += "PERSONAL (operativ, ohne Mgmt):\n";
    ctx += "Kosten: " + fmt(paTotal) + " (" + fmtP(paQ) + ") " + status(paQ,ZIELE.pa,true) + " (Ziel ≤22%)\n";
    ctx += "Stunden: " + Math.round(paStd) + "h | Ø " + fmtD(paStd>0?paTotal/paStd:0) + "/h Stundenlohn (all-in)\n";
    ctx += "Umsatz/Personalstunde: " + fmt(uStd) + " " + status(uStd,ZIELE.umsatzStd,false) + " (Ziel ≥€75)\n";

    // Aufbau/Abbau
    var aufStd=0,aufK=0,aufN=0,abStd=0,abK=0,abN=0;
    ordioOp.forEach(function(r){
      var oh=getShiftOverhead(r);
      if(oh.vorStd>0){aufStd+=oh.vorStd;aufK+=oh.vorKosten;aufN++;}
      if(oh.nachStd>0){abStd+=oh.nachStd;abK+=oh.nachKosten;abN++;}
    });
    if(aufN>0||abN>0){
      ctx += "Aufbau (vor 12:00): " + aufStd.toFixed(1) + "h / " + fmt(aufK) + " (" + aufN + " Schichten, Ø " + (aufN>0?(aufStd/aufN).toFixed(1):"0") + "h)\n";
      ctx += "Abbau (nach Schluss): " + abStd.toFixed(1) + "h / " + fmt(abK) + " (" + abN + " Schichten, Ø " + (abN>0?(abStd/abN).toFixed(1):"0") + "h)\n";
      ctx += "Nicht-umsatzgenerierende Stunden: " + fmtP(paStd>0?(aufStd+abStd)/paStd:0) + " der Gesamtstunden\n";
      // Aufbau/Abbau pro Standort
      var abStMap={};
      ordioOp.forEach(function(r){
        var oh=getShiftOverhead(r);
        if(!abStMap[r.standort])abStMap[r.standort]={aufStd:0,aufK:0,abStd:0,abK:0,aufN:0,abN:0};
        if(oh.vorStd>0){abStMap[r.standort].aufStd+=oh.vorStd;abStMap[r.standort].aufK+=oh.vorKosten;abStMap[r.standort].aufN++;}
        if(oh.nachStd>0){abStMap[r.standort].abStd+=oh.nachStd;abStMap[r.standort].abK+=oh.nachKosten;abStMap[r.standort].abN++;}
      });
      Object.entries(abStMap).forEach(function(e){
        ctx += e[0] + ": Aufbau " + e[1].aufStd.toFixed(1) + "h/" + fmt(e[1].aufK) + " | Abbau " + e[1].abStd.toFixed(1) + "h/" + fmt(e[1].abK) + "\n";
      });
    }

    // Top MA mit Aufbau/Abbau-Details
    var maMap = {};
    ordioOp.forEach(function(r){
      if(!maMap[r.mitarbeiter])maMap[r.mitarbeiter]={stunden:0,kosten:0,aufStd:0,aufK:0,aufN:0,abStd:0,abK:0,abN:0,schichten:0};
      maMap[r.mitarbeiter].stunden+=r.stunden;maMap[r.mitarbeiter].kosten+=r.kosten;maMap[r.mitarbeiter].schichten++;
      var oh=getShiftOverhead(r);
      if(oh.vorStd>0){maMap[r.mitarbeiter].aufStd+=oh.vorStd;maMap[r.mitarbeiter].aufK+=oh.vorKosten;maMap[r.mitarbeiter].aufN++;}
      if(oh.nachStd>0){maMap[r.mitarbeiter].abStd+=oh.nachStd;maMap[r.mitarbeiter].abK+=oh.nachKosten;maMap[r.mitarbeiter].abN++;}
    });
    var maSorted=Object.entries(maMap).sort(function(a,b){return b[1].stunden-a[1].stunden;});
    ctx += "MITARBEITER-DETAILS (Top "+Math.min(maSorted.length,10)+" nach Stunden):\n";
    maSorted.slice(0,10).forEach(function(e){
      var m=e[1];
      var line=e[0]+": "+Math.round(m.stunden)+"h / "+fmt(m.kosten)+" ("+m.schichten+" Schichten)";
      if(m.aufN>0) line+=" | Aufbau: Ø "+(m.aufStd/m.aufN).toFixed(1)+"h ("+m.aufN+"×, "+fmt(m.aufK)+")";
      if(m.abN>0) line+=" | Abbau: Ø "+(m.abStd/m.abN).toFixed(1)+"h ("+m.abN+"×, "+fmt(m.abK)+")";
      var betriebStd=m.stunden-m.aufStd-m.abStd;
      if(m.stunden>0) line+=" | Betrieb: "+fmtP(betriebStd/m.stunden)+" der Zeit";
      ctx += line + "\n";
    });
    ctx += "\n";

    // Abbau-Effizienz Ranking (wie im Dashboard, sortiert nach Ø Abbau-Stunden, min. 2 Schichten)
    var abRanking=Object.entries(maMap).filter(function(e){return e[1].abN>=2;}).sort(function(a,b){return(a[1].abStd/a[1].abN)-(b[1].abStd/b[1].abN);});
    if(abRanking.length>0){
      ctx += "ABBAU-EFFIZIENZ RANKING (Ø Stunden nach Ladenschluss, min. 2 Schichten):\n";
      abRanking.forEach(function(e,i){
        var m=e[1];var avg=(m.abStd/m.abN).toFixed(1);
        ctx += (i+1)+". "+e[0]+": Ø "+avg+"h ("+m.abN+" Schichten, "+fmt(m.abK)+")"+(avg<=1.0?" ✅":avg<=1.3?" ⚠️":" 🔴")+"\n";
      });
      ctx += "\n";
    }

    // Aufbau-Effizienz Ranking (wie im Dashboard, sortiert nach Ø Aufbau-Stunden, min. 2 Schichten)
    var aufRanking=Object.entries(maMap).filter(function(e){return e[1].aufN>=2;}).sort(function(a,b){return(a[1].aufStd/a[1].aufN)-(b[1].aufStd/b[1].aufN);});
    if(aufRanking.length>0){
      ctx += "AUFBAU-EFFIZIENZ RANKING (Ø Stunden vor Öffnung, min. 2 Schichten):\n";
      aufRanking.forEach(function(e,i){
        var m=e[1];var avg=(m.aufStd/m.aufN).toFixed(1);
        ctx += (i+1)+". "+e[0]+": Ø "+avg+"h ("+m.aufN+" Schichten, "+fmt(m.aufK)+")"+(avg<=1.0?" ✅":avg<=1.5?" ⚠️":" 🔴")+"\n";
      });
      ctx += "\n";
    }
  }

  // Waste
  var wasteFilt = waste.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  if(wasteFilt.length > 0) {
    var totalWaste = wasteFilt.reduce(function(s,r){return s+r.kosten;},0);
    var wasteQ = kFilt.u>0?totalWaste/kFilt.u:0;
    ctx += "WASTE/VERLUSTE:\n";
    ctx += "Gesamt: " + fmt(totalWaste) + " (" + fmtP(wasteQ) + " vom Umsatz) " + status(wasteQ,0.02,true) + " (Ziel <2%)\n";
    var artWasteMap = {};
    wasteFilt.forEach(function(r){
      if(!artWasteMap[r.artikel])artWasteMap[r.artikel]={kosten:0,kategorie:r.kategorie};
      artWasteMap[r.artikel].kosten+=r.kosten;
    });
    ctx += "Top Waste: " + Object.entries(artWasteMap).sort(function(a,b){return b[1].kosten-a[1].kosten;}).slice(0,5).map(function(e){return e[0]+" "+fmt(e[1].kosten)+" ("+e[1].kategorie+")";}).join(", ") + "\n\n";
  }

  // Top Artikel
  var artFilt = artikel.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&r.preisN>0&&datumPasstWT(r.datum);});
  if(artFilt.length > 0) {
    var artMap = {};
    artFilt.forEach(function(r){
      if(!artMap[r.name])artMap[r.name]={umsatz:0,menge:0,gruppe:r.gruppe};
      artMap[r.name].umsatz+=r.preisN;artMap[r.name].menge+=r.menge;
    });
    ctx += "TOP ARTIKEL:\n";
    Object.entries(artMap).sort(function(a,b){return b[1].umsatz-a[1].umsatz;}).slice(0,10).forEach(function(e){
      ctx += e[0] + ": " + fmt(e[1].umsatz) + " | " + Math.round(e[1].menge) + "x | Ø " + fmtD(e[1].umsatz/Math.max(e[1].menge,1)) + "\n";
    });
    ctx += "\n";
  }

  // Zahlungsarten
  var payFilt = lsPay.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  if(payFilt.length > 0) {
    var pBar = payFilt.reduce(function(s,r){return s+r.bar;},0);
    var pMan = payFilt.reduce(function(s,r){return s+(r.manuell||0);},0);
    var pKarte = payFilt.reduce(function(s,r){return s+r.karte;},0);
    var pLdo = payFilt.reduce(function(s,r){return s+r.ldo;},0);
    var pOnline = payFilt.reduce(function(s,r){return s+(r.onlineOrder||0);},0);
    var pTotal = pBar+pMan+pKarte+pLdo+pOnline;
    ctx += "ZAHLUNGSARTEN:\n";
    ctx += "Karte: " + fmt(pKarte) + " (" + fmtP(pTotal>0?pKarte/pTotal:0) + ") | Bar (Bargeld): " + fmt(pBar) + " (" + fmtP(pTotal>0?pBar/pTotal:0) + ") | Manuell: " + fmt(pMan) + " | Lieferando: " + fmt(pLdo) + " | Online: " + fmt(pOnline) + "\n\n";
  }

  // Kanäle
  var bFilt = bons.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&r.storniert===0&&datumPasstWT(r.datum);});
  if(bFilt.length > 0) {
    var kanalMap = {};
    bFilt.forEach(function(r){
      var k = r.kanal || "Sonstige";
      if(!kanalMap[k]) kanalMap[k] = {umsatz:0, bons:0};
      kanalMap[k].umsatz += r.total;kanalMap[k].bons += 1;
    });
    ctx += "KANÄLE:\n";
    Object.entries(kanalMap).sort(function(a,b){return b[1].umsatz-a[1].umsatz;}).forEach(function(e){
      ctx += e[0] + ": " + fmt(e[1].umsatz) + " (" + e[1].bons + " Bons, Ø " + fmtD(e[1].umsatz/Math.max(e[1].bons,1)) + "/Bon)\n";
    });
    ctx += "\n";
  }

  // Trinkgeld
  var bonsFiltAll = bons.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  if(bonsFiltAll.length > 0) {
    var bonsOhneLdo = bonsFiltAll.filter(function(r){return r.kanal!=="Lieferando";});
    var tkGesamt = bonsOhneLdo.reduce(function(s,r){return s+r.trinkgeld;},0);
    var totalOhneLdo = bonsOhneLdo.reduce(function(s,r){return s+r.total;},0);
    ctx += "TRINKGELD (ohne Lieferando): " + fmt(tkGesamt) + " (" + fmtP(totalOhneLdo>0?tkGesamt/totalOhneLdo:0) + ")\n\n";
  }

  // GuV-Schnellrechnung
  var ldoProv = 0;
  var txFilt = lsTx.filter(function(r){return r.datum>=von&&r.datum<=bis&&(st==="Alle Standorte"||r.standort===st)&&datumPasstWT(r.datum);});
  // LDO nur für Tage mit Apicbase-Daten (aligned)
  var briefDatumSet={};gefiltert.forEach(function(r){briefDatumSet[r.datum]=1;});
  var txFiltAligned=txFilt.filter(function(r){return briefDatumSet[r.datum];});
  ldoProv = txFiltAligned.reduce(function(s,r){return s+r.ldo;},0)*0.20;
  // FC: Ist wenn verfügbar, sonst Soll (gleiche Logik wie alle anderen Tabs)
  var briefRfc=getRealFC(st);
  var briefHatIst=istInBestandZeitraum(von,bis,briefRfc);
  var briefFcAmt=briefHatIst?briefRfc.quote*kFilt.u:kFilt.f;
  var briefFcPct=briefHatIst?briefRfc.quote:kFilt.fp;
  var briefFcLabel=briefHatIst?"Ist":"Soll";
  var rohertrag = kFilt.u - briefFcAmt - ldoProv;
  var paK = ordioOp.length>0?ordioOp.reduce(function(s,r){return s+r.kosten;},0):kFilt.u*0.33;
  var cm = rohertrag - paK;
  var cmP = kFilt.u>0?cm/kFilt.u:0;
  ctx += "GuV-SCHNELLRECHNUNG:\n";
  ctx += "Nettoumsatz: " + fmt(kFilt.u) + "\n";
  ctx += "– Food Cost ("+briefFcLabel+"): " + fmt(briefFcAmt) + " (" + fmtP(briefFcPct) + ")\n";
  ctx += "– Lieferando-Provision: " + fmt(ldoProv) + "\n";
  ctx += "= Rohertrag: " + fmt(rohertrag) + " (" + fmtP(kFilt.u>0?rohertrag/kFilt.u:0) + ")\n";
  ctx += "– Personal: " + fmt(paK) + " (" + fmtP(kFilt.u>0?paK/kFilt.u:0) + ")\n";
  ctx += "= CM: " + fmt(cm) + " (" + fmtP(cmP) + ") " + status(cmP,ZIELE.cm,false) + " (Ziel ≥40%)\n";

  return ctx;
}

function mdToHtml(md) {
  // Simple markdown → HTML for AI responses
  var html = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // Bold
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    // Italic
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    // Headers
    .replace(/^### (.+)$/gm,"<h4 style='margin:10px 0 4px;font-size:0.95em'>$1</h4>")
    .replace(/^## (.+)$/gm,"<h3 style='margin:12px 0 4px;font-size:1em'>$1</h3>")
    .replace(/^# (.+)$/gm,"<h3 style='margin:12px 0 6px;font-size:1.05em'>$1</h3>")
    // Horizontal rules
    .replace(/^---$/gm,"<hr style='border:none;border-top:1px solid #444;margin:8px 0'>")
    // Unordered lists (•, -, *)
    .replace(/^[\-\*•]\s+(.+)$/gm,"<li>$1</li>")
    // Numbered lists
    .replace(/^\d+\.\s+(.+)$/gm,"<li>$1</li>");
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g,"<ul style='margin:4px 0 4px 16px;padding:0;list-style:disc'>$1</ul>");
  // Paragraphs: double newlines
  html = html.replace(/\n\n+/g,"</p><p style='margin:6px 0'>");
  // Single newlines → <br>
  html = html.replace(/\n/g,"<br>");
  html = "<p style='margin:6px 0'>" + html + "</p>";
  // Clean up empty paragraphs
  html = html.replace(/<p style='margin:6px 0'>\s*<\/p>/g,"");
  return html;
}

function addAiMessage(role, text) {
  var msgs = document.getElementById("ai-messages");
  var div = document.createElement("div");
  div.className = "ai-msg " + role;
  if(role.indexOf("assistant") !== -1 && role.indexOf("thinking") === -1) {
    div.innerHTML = mdToHtml(text);
  } else {
    div.textContent = text;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendAiMessage() {
  if(aiThinking) return;
  var input = document.getElementById("ai-input");
  var text = input.value.trim();
  if(!text) return;

  input.value = "";
  document.getElementById("ai-suggestions").style.display = "none";
  addAiMessage("user", text);

  aiHistory.push({role:"user", content:text});
  aiThinking = true;
  document.getElementById("ai-send").disabled = true;

  var thinkingEl = addAiMessage("assistant thinking", "⏳ Analysiere deine Daten...");

  try {
    // Konversations-History kappen (max 10 Nachrichten = 5 Hin-und-Her)
    if(aiHistory.length > 10) aiHistory = aiHistory.slice(-10);

    // System prompt mit allen Daten
    var systemPrompt = "Du bist der BI-Analyst von Bang Bang Noodles (BBN) Berlin — ein asiatisches Nudelrestaurant mit 2 Standorten.\n\n" +
      "STANDORTE:\n" +
      "• Mehringdamm (MD) — Kreuzberg\n" +
      "• Rosenthaler Straße (RS) — Mitte\n\n" +
      "GESCHÄFTSMODELL:\n" +
      "• Kanäle: Inhouse (vor Ort), Takeaway, Lieferando (20% Provision)\n" +
      "• Kassensystem: Lightspeed (LS). Personalsystem: Ordio. Warenwirtschaft: Apicbase.\n" +
      "• Zahlungsarten: Karte, Bar (=Bargeld/Cash), Manuell, Lieferando, Online Order\n" +
      "• WICHTIG: 'Bar' = Barzahlung/Bargeld. NIEMALS Getränkebar.\n" +
      "• Management (nicht in PA-Quote): Kevin Weber, Jan Haring, Buted Deleg\n" +
      "• Öffnungszeiten: Di–Do 12–21, Fr–Sa 12–22, So 12–21, Mo geschlossen\n\n" +
      "ZIELWERTE (monatlich):\n" +
      "• Food Cost: ≤25% vom Umsatz (gut <23%, kritisch >28%)\n" +
      "• Personal-Quote: ≤22% vom Umsatz (gut <20%, kritisch >25%)\n" +
      "• Contribution Margin: ≥40%\n" +
      "• EBITDA-Marge: ≥10%\n" +
      "• Ø Bon-Wert: ≥€22 (gut >€24)\n" +
      "• Umsatz/Personalstunde: ≥€75 (gut >€85, kritisch <€65)\n" +
      "• Waste/Schwund: <2% vom Umsatz\n\n" +
      "ANALYSE-REGELN:\n" +
      "1. Antworte auf Deutsch, direkt und konkret. Keine Einleitungen wie 'Gerne analysiere ich...'.\n" +
      "2. Nenne IMMER konkrete Zahlen. Statt 'die FC-Quote ist hoch' sage 'FC liegt bei 27,3% — 2,3 Prozentpunkte über Ziel (25%)'.\n" +
      "3. Vergleiche IMMER: Ist vs. Ziel, MD vs. RS, aktuell vs. Benchmark.\n" +
      "4. Bei Abweichungen: Nenne die Abweichung in € UND %, dann mögliche Ursache, dann konkrete Handlungsempfehlung.\n" +
      "5. Wenn Daten fehlen oder unklar sind, sag das klar statt zu raten.\n" +
      "6. Formatiere mit **fett** für Schlüsselzahlen und Markdown-Listen für Übersichtlichkeit.\n" +
      "7. GuV-Logik: Umsatz – Food Cost – Lieferando-Provision = Rohertrag. Rohertrag – Personal = CM. CM – Fixkosten = EBITDA.\n\n" +
      "AKTUELLE DASHBOARD-DATEN:\n" +
      buildAiContext();

    var apiKey = localStorage.getItem("bbn_ai_key") || "";
    if(!apiKey) {
      thinkingEl.remove();
      addAiMessage("assistant", "⚠️ Bitte zuerst den Anthropic API Key eingeben (oben im Chat-Fenster).");
      aiThinking = false;
      document.getElementById("ai-send").disabled = false;
      aiHistory.pop();
      return;
    }

    var response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: systemPrompt,
        messages: aiHistory
      })
    });

    if(!response.ok) {
      var errData = await response.json().catch(function(){return{};});
      throw new Error((errData.error&&errData.error.message)||"HTTP "+response.status);
    }
    var data = await response.json();

    if(data.error) throw new Error(data.error.message);

    var reply = data.content && data.content[0] ? data.content[0].text : "Keine Antwort erhalten.";
    thinkingEl.remove();
    addAiMessage("assistant", reply);
    aiHistory.push({role:"assistant", content:reply});

    // Badge anzeigen wenn Panel zu
    if(!aiOpen) {
      document.getElementById("ai-badge").classList.add("show");
    }

  } catch(e) {
    thinkingEl.remove();
    var errMsg = e.message || "Unbekannter Fehler";
    if(errMsg==="Failed to fetch") errMsg="Verbindung zur API fehlgeschlagen. API-Key prüfen oder später erneut versuchen.";
    else if(errMsg.includes("401") || errMsg.includes("auth")) errMsg="API-Key ungültig oder abgelaufen. Bitte neuen Key eingeben.";
    else if(errMsg.includes("429")) errMsg="Zu viele Anfragen — bitte kurz warten.";
    else if(errMsg.includes("overloaded")) errMsg="API überlastet — bitte in 1-2 Minuten erneut versuchen.";
    addAiMessage("assistant", "⚠️ " + errMsg);
    aiHistory.pop();
  } finally {
    aiThinking = false;
    document.getElementById("ai-send").disabled = false;
  }
}
</script>

<script>
(function(){
  var TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "font-display": "inter",
    "font-body": "inter",
    "font-weight": "regular"
  }/*EDITMODE-END*/;

  var PREVIEW_SAMPLES = ["Aa","Bb","Hg","Rg","Mn","Kf"];

  function applyAll(vals){
    ['font-display','font-body','font-weight'].forEach(function(k){
      if(vals[k]) document.documentElement.setAttribute('data-'+k, vals[k]);
    });
    document.querySelectorAll('.tw-btn').forEach(function(b){
      var k = b.getAttribute('data-tw'), v = b.getAttribute('data-val');
      b.classList.toggle('on', vals[k] === v);
    });
    // previews inherit from html data-font-*
    var d = document.getElementById('prevDisp'), bp = document.getElementById('prevBody');
    if(d) d.style.fontFamily = getComputedStyle(document.documentElement).getPropertyValue('--font-display');
    if(bp) bp.style.fontFamily = getComputedStyle(document.documentElement).getPropertyValue('--font-body');
  }

  var state = Object.assign({}, TWEAK_DEFAULTS);
  applyAll(state);

  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.type === '__activate_edit_mode'){
      document.getElementById('twPanel').classList.add('on');
    } else if(d.type === '__deactivate_edit_mode'){
      document.getElementById('twPanel').classList.remove('on');
    }
  });
  try { window.parent.postMessage({type:'__edit_mode_available'},'*'); } catch(e){}

  function persist(partial){
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits: partial},'*'); } catch(e){}
  }

  document.addEventListener('click', function(e){
    var btn = e.target.closest('.tw-btn');
    if(!btn) return;
    var k = btn.getAttribute('data-tw'), v = btn.getAttribute('data-val');
    state[k] = v;
    applyAll(state);
    var p = {}; p[k] = v; persist(p);
  });

  // sync button
  var syncBtn = document.getElementById('twSync');
  if(syncBtn) syncBtn.addEventListener('click', function(){
    state['font-body'] = state['font-display'];
    applyAll(state);
    persist({'font-body': state['font-body']});
    syncBtn.classList.add('just-did');
    setTimeout(function(){ syncBtn.classList.remove('just-did'); }, 500);
  });

  // collapse
  var collapseBtn = document.getElementById('twCollapse');
  var body = document.getElementById('twBody');
  if(collapseBtn) collapseBtn.addEventListener('click', function(){
    body.classList.toggle('collapsed');
    collapseBtn.textContent = body.classList.contains('collapsed') ? '+' : '–';
  });

  // keyboard shortcuts: D/d cycle display, B/b cycle body, W/w cycle weight
  var FONT_KEYS = ["system","inter","geist","dmsans","grotesk","manrope","jakarta","sora","plex","figtree","work","fraunces"];
  var WEIGHT_KEYS = ['light','regular','medium','bold','black'];
  document.addEventListener('keydown', function(e){
    if(!document.getElementById('twPanel').classList.contains('on')) return;
    if(e.target.matches('input,textarea,select')) return;
    var cycle = function(arr, cur, dir){ var i = arr.indexOf(cur); return arr[(i+dir+arr.length)%arr.length]; };
    var dir = e.shiftKey ? -1 : 1;
    if(e.key === 'd' || e.key === 'D'){ state['font-display'] = cycle(FONT_KEYS, state['font-display'], dir); applyAll(state); persist({'font-display':state['font-display']}); e.preventDefault(); }
    else if(e.key === 'b' || e.key === 'B'){ state['font-body'] = cycle(FONT_KEYS, state['font-body'], dir); applyAll(state); persist({'font-body':state['font-body']}); e.preventDefault(); }
    else if(e.key === 'w' || e.key === 'W'){ state['font-weight'] = cycle(WEIGHT_KEYS, state['font-weight'], dir); applyAll(state); persist({'font-weight':state['font-weight']}); e.preventDefault(); }
  });
})();
</script>
